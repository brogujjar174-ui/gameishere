<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MA - Fixed Multiplayer Squad Game</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0f171e; color: white; }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .active { display: flex; }

        /* Auth Screen */
        #auth-screen { flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #2c3e50, #000000); }
        .form-container { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); width: 90%; max-width: 340px; text-align: center; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); }
        .form-container h1 { margin-bottom: 15px; color: #00ffcc; letter-spacing: 2px; font-size: 28px; }
        
        .auth-tabs { display: flex; margin-bottom: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 4px; }
        .auth-tab-btn { flex: 1; padding: 8px; background: none; border: none; color: #ccc; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .auth-tab-btn.active-tab { background: #00ffcc; color: black; }

        .form-container input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; outline: none; }
        .form-container button.submit-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: #00ffcc; color: black; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* Lobby Screen */
        #lobby-screen { background: radial-gradient(circle, #2c3e50, #0f171e); flex-direction: column; position: relative; width: 100%; height: 100%; }
        .top-nav { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; padding: 15px; position: absolute; top: 0; left: 0; z-index: 10; }
        
        .profile-card { background: rgba(0,0,0,0.6); border-radius: 12px; border: 1.5px solid #00ffcc; width: 150px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .banner-bg { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; position: relative; background: rgba(255,255,255,0.1); }
        .profile-name { position: absolute; top: 2px; width: 100%; text-align: center; font-size: 11px; color: yellow; font-weight: bold; text-shadow: 1px 1px 3px #000; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .profile-uid { position: absolute; bottom: 2px; width: 100%; text-align: center; font-size: 10px; color: #fff; }
        .avatar-container { padding: 6px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); }
        .avatar-box { font-size: 22px; background: rgba(255,255,255,0.1); border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border: 1px solid #aaa; }
        .level-txt { font-size: 10px; font-weight: bold; color: #00ffcc; display: flex; flex-direction: column; }

        .currencies { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .currency-box { background: rgba(0,0,0,0.7); padding: 6px 14px; border-radius: 20px; border: 1px solid #444; display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 14px; min-width: 90px; justify-content: flex-start; }

        /* Group Alert Panel Box */
        .group-status-bar { position: absolute; top: 95px; left: 15px; background: rgba(0, 153, 255, 0.4); border: 1.5px solid #0099ff; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; display: none; z-index: 10; color: #fff; text-shadow: 1px 1px 2px #000; }

        .center-character { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 90px; text-shadow: 0px 0px 25px rgba(0,255,204,0.3); animation: float 3s ease-in-out infinite; z-index: 2; }
        @keyframes float { 0%, 100% { transform: translate(-50%, -53%); } 50% { transform: translate(-50%, -47%); } }

        .left-menu { position: absolute; left: 15px; top: 150px; display: flex; flex-direction: column; gap: 12px; z-index: 5; }
        .menu-btn { padding: 10px 15px; font-size: 13px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #e74c3c; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.4); text-align: center; min-width: 100px; }
        .menu-btn.mission { background: #2ecc71; }

        /* Friends Area Layout */
        .friends-list-panel { position: absolute; right: 15px; top: 150px; width: 150px; max-height: 230px; background: rgba(0,0,0,0.6); border: 1px solid #34495e; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; z-index: 5; }
        .friends-panel-header { font-size: 11px; font-weight: bold; color: #00ffcc; text-align: center; border-bottom: 1px solid #444; padding-bottom: 4px; margin-bottom: 2px; }
        .friend-row-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 6px; font-size: 11px; }
        .invite-friend-btn { padding: 3px 8px; background: #00ffcc; border: none; color: black; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 12px; }

        .bottom-nav { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10; }
        .start-btn { padding: 12px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; background: linear-gradient(45deg, #f1c40f, #f39c12); color: black; cursor: pointer; box-shadow: 0 0 15px #f1c40f; }
        
        .right-action-cluster { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .action-cluster-btn { padding: 8px 12px; font-size: 11px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; width: 105px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }

        /* Modals */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c2833; border: 2.5px solid #00ffcc; border-radius: 15px; width: 90%; max-width: 400px; max-height: 75vh; overflow-y: auto; padding: 20px; z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #34495e; padding-bottom: 8px; }
        .close-modal { font-size: 22px; cursor: pointer; background: none; border: none; color: white; }
        
        /* Game Screen Layout (Fixed Mobile Grid Aspect Ratio) */
        #game-screen { background: #0a0a0a; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .game-header { width: 100%; max-width: 360px; display: flex; justify-content: space-between; padding: 10px 0; font-size: 16px; font-weight: bold; color: #00ffcc; }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 5px; 
            width: 100%; 
            max-width: 360px; 
            background: #1c1c1c; 
            padding: 8px; 
            border-radius: 10px; 
            border: 2px solid #444; 
        }
        .grid-box { background: #2a2a2a; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; aspect-ratio: 1; width: 100%; }

        /* Group Invitation Realtime Floating Box Dial */
        .invite-received-dialog { display: none; position: fixed; bottom: 30px; left: 5%; width: 90%; max-width: 350px; background: #1a252f; border: 2.5px solid #3498db; padding: 15px; border-radius: 12px; z-index: 500; box-shadow: 0 5px 25px rgba(0,0,0,0.6); flex-direction: column; gap: 10px; }

        /* Search Layout Components */
        .search-wrapper { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-wrapper input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #555; background: rgba(0,0,0,0.3); color: white; outline: none; }
        .profile-preview-card { background: rgba(0,0,0,0.5); border-radius: 10px; padding: 15px; border: 1px dashed #00ffcc; text-align: center; display: none; flex-direction: column; align-items: center; }
        .like-counter-badge { margin: 8px 0; background: #34495e; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: #f1c40f; }
        .action-inline-btn { padding: 6px 12px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .req-item-box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }

        #countdown-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; font-size:100px; font-weight:bold; color:#fff; z-index:200; }
    </style>
</head>
<body>

    <div id="countdown-overlay">3</div>

    <div id="store-modal" class="modal">
        <div class="modal-header">
            <h3>MA STORE 🛒</h3>
            <button class="close-modal" onclick="closeModal('store-modal')">✖</button>
        </div>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px;" id="store-items-container"></div>
    </div>

    <div id="mission-modal" class="modal">
        <div class="modal-header">
            <h3>MISSIONS 📜</h3>
            <button class="close-modal" onclick="closeModal('mission-modal')">✖</button>
        </div>
        <div id="missions-container"></div>
    </div>

    <div id="add-friend-modal" class="modal">
        <div class="modal-header">
            <h3>FIND FRIENDS 🔍</h3>
            <button class="close-modal" onclick="closeModal('add-friend-modal')">✖</button>
        </div>
        <div class="search-wrapper">
            <input type="text" id="friend-search-input" placeholder="Enter Name or 6-digit UID...">
            <button class="action-inline-btn" style="background:#00ffcc; color:black;" onclick="searchUserSocial()">SEARCH</button>
        </div>
        <div class="profile-preview-card" id="social-profile-card">
            <div class="profile-card" style="transform: scale(1.1); margin-bottom:15px; margin-top:10px; align-self:center;">
                <div class="banner-bg" id="social-banner">🎟</div>
                <div class="profile-name" id="social-name">User</div>
                <div class="profile-uid" id="social-uid">UID: ------</div>
                <div class="avatar-container">
                    <div class="avatar-box" id="social-avatar">🍁</div>
                    <div class="level-txt"><span>LEVEL</span><span id="social-level" style="color:#ffcc00;">1</span></div>
                </div>
            </div>
            <div class="like-counter-badge">👍 Likes: <span id="social-likes-count">0</span></div>
            <div style="display:flex; gap:10px; width:100%; margin-top:10px;">
                <button class="action-inline-btn" style="flex:1; background:#f1c40f; color:black;" id="social-like-btn">LIKE 👍</button>
                <button class="action-inline-btn" style="flex:1; background:#3498db;" id="social-request-btn">ADD FRIEND ➕</button>
            </div>
        </div>
    </div>

    <div id="requests-modal" class="modal">
        <div class="modal-header">
            <h3>FRIEND REQUESTS 📥</h3>
            <button class="close-modal" onclick="closeModal('requests-modal')">✖</button>
        </div>
        <div id="requests-container-list"></div>
    </div>

    <div id="group-invite-dialog" class="invite-received-dialog">
        <p id="group-invite-text" style="font-size:13px; font-weight:bold; color:#00ffcc;"></p>
        <div style="display:flex; gap:10px;">
            <button class="action-inline-btn" style="background:#e74c3c; flex:1;" onclick="rejectGroupInvite()">REJECT</button>
            <button class="action-inline-btn" style="background:#2ecc71; flex:1;" onclick="acceptGroupInvite()">ACCEPT</button>
        </div>
    </div>

    <div id="auth-screen" class="screen active">
        <div class="form-container">
            <h1>MA GAME</h1>
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab-btn active-tab" onclick="switchAuthMode('login')">LOGIN</button>
                <button id="tab-signup" class="auth-tab-btn" onclick="switchAuthMode('signup')">SIGN UP</button>
            </div>
            <input type="text" id="auth-username" placeholder="Username (For Sign Up Only)" style="display: none;">
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password">
            <button class="submit-btn" id="auth-submit-btn" onclick="handleAuthSubmit()">LOG IN & PLAY</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="top-nav">
            <div class="profile-card">
                <div class="banner-bg" id="prof-banner">🎟</div>
                <div class="profile-name" id="prof-name">User</div>
                <div class="profile-uid" id="prof-uid">UID: ------</div>
                <div class="avatar-container">
                    <div class="avatar-box" id="prof-avatar">🍁</div>
                    <div class="level-txt"><span>LEVEL</span><span id="prof-level" style="color:#ffcc00;">1</span></div>
                </div>
            </div>
            <div class="currencies">
                <div class="currency-box">🪙 <span id="lobby-coins">0</span></div>
                <div class="currency-box">💎 <span id="lobby-diamonds">0</span></div>
            </div>
        </div>

        <div class="group-status-bar" id="group-status-panel">Squad Room Active 👥</div>

        <div class="center-character" id="lobby-character">🏀🏃‍♀️</div>

        <div class="left-menu">
            <button class="menu-btn" onclick="openStore()">STORE 🛒</button>
            <button class="menu-btn mission" onclick="openMissions()">MISSION 📜</button>
            <button class="menu-btn" id="leave-group-btn" style="background:#7f8c8d; display:none;" onclick="leaveCurrentGroup()">LEAVE SQUAD</button>
        </div>

        <div class="friends-list-panel">
            <div class="friends-panel-header">FRIENDS LIST 👥</div>
            <div id="lobby-friends-container" style="display:flex; flex-direction:column; gap:4px;"></div>
        </div>

        <div class="bottom-nav">
            <button class="menu-btn" style="background:#9b59b6; min-width:90px;">BAG 🎒</button>
            <button class="start-btn" id="main-start-btn" onclick="triggerStartGameAction()">START 🚀</button>
            <div class="right-action-cluster">
                <button class="action-cluster-btn" style="background:#2ecc71;" onclick="openAddFriendModal()">ADD FRIEND 👤</button>
                <button class="action-cluster-btn" style="background:#e67e22;" onclick="openRequestsModal()">REQUESTS 🔔</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <div>Apple: <span id="game-score">0</span> / <span id="target-score">6</span></div>
            <div>Level: <span id="game-current-level">1</span></div>
        </div>
        <div class="grid-container" id="game-grid"></div>
        <button class="menu-btn" style="margin-top:15px; background:#e74c3c;" onclick="exitGame()">EXIT LOBBY</button>
    </div>

    <script>
        // Firebase Config Setup
        const firebaseConfig = {
            apiKey: "AIzaSyAJGU-ZX2GFOek8hteak0UPPYPQP_e1arY",
            authDomain: "triple-ae17f.firebaseapp.com",
            databaseURL: "https://triple-ae17f-default-rtdb.firebaseio.com",
            projectId: "triple-ae17f",
            storageBucket: "triple-ae17f.firebasestorage.app",
            messagingSenderId: "1054581990158",
            appId: "1:1054581990158:web:c7cf28f432e826baa12d5f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentAuthMode = "login"; 
        let currentFirebaseUserKey = "";
        let currentGroupId = ""; 
        let incomingInviteData = null;

        let userData = {
            username: "", uid: "", email: "", coins: 100, diamonds: 520, level: 7, likes: 0,
            currentItems: { char: "🏀🏃‍♀️", avatar: "🍁", banner: "🎟" },
            friends: {}, requests: {}, currentGroupId: ""
        };

        // Anti-Glitch Fix: Realtime Auth Session Change Track Engine Loop
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentFirebaseUserKey = user.uid;
                setupSyncListener(currentFirebaseUserKey);
            } else {
                showScreen("auth-screen");
            }
        });

        function switchAuthMode(mode) {
            currentAuthMode = mode;
            document.querySelectorAll('.auth-tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            if (mode === "login") {
                document.getElementById("tab-login").classList.add('active-tab');
                document.getElementById("auth-username").style.display = "none";
                document.getElementById("auth-submit-btn").innerText = "LOG IN & PLAY";
            } else {
                document.getElementById("tab-signup").classList.add('active-tab');
                document.getElementById("auth-username").style.display = "block";
                document.getElementById("auth-submit-btn").innerText = "CREATE ACCOUNT";
            }
        }

        function handleAuthSubmit() {
            const email = document.getElementById("auth-email").value.trim();
            const pass = document.getElementById("auth-password").value.trim();
            const name = document.getElementById("auth-username").value.trim();

            if (!email || !pass) { alert("Please fill all details!"); return; }

            if (currentAuthMode === "signup") {
                if (!name) { alert("Please provide a Username!"); return; }
                auth.createUserWithEmailAndPassword(email, pass).then((userCredential) => {
                    const randomUID = Math.floor(100000 + Math.random() * 900000).toString();
                    currentFirebaseUserKey = userCredential.user.uid;
                    userData.username = name;
                    userData.uid = randomUID;
                    userData.email = email;
                    userData.currentGroupId = "";
                    database.ref('users/' + currentFirebaseUserKey).set(userData);
                }).catch(error => alert(error.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass).catch(error => alert(error.message));
            }
        }

        function setupSyncListener(firebaseUid) {
            // General Secure Profile Data Node Listener Tracks
            database.ref('users/' + firebaseUid).on('value', (snapshot) => {
                if(snapshot.exists()) {
                    userData = snapshot.val();
                    updateLobbyUI();
                    renderLobbyFriendsList();
                    
                    // Squad/Room Live Dynamic Synchronization Logic
                    if(userData.currentGroupId) {
                        currentGroupId = userData.currentGroupId;
                        document.getElementById("group-status-panel").style.display = "block";
                        document.getElementById("group-status-panel").innerText = "In Squad Room 👥";
                        document.getElementById("leave-group-btn").style.display = "block";
                        listenToGroupGameStatus(userData.currentGroupId);
                    } else {
                        currentGroupId = "";
                        document.getElementById("group-status-panel").style.display = "none";
                        document.getElementById("leave-group-btn").style.display = "none";
                        document.getElementById("main-start-btn").innerText = "START 🚀";
                    }
                    showScreen("lobby-screen");
                }
            });

            // Handle Incoming MultiPlayer Live Invitations Requests
            database.ref('groupInvites/' + firebaseUid).on('value', (snapshot) => {
                if(snapshot.exists()) {
                    incomingInviteData = snapshot.val();
                    document.getElementById("group-invite-text").innerText = `${incomingInviteData.senderName} invited you to join their group!`;
                    document.getElementById("group-invite-dialog").style.display = "flex";
                } else {
                    document.getElementById("group-invite-dialog").style.display = "none";
                }
            });
        }

        function updateLobbyUI() {
            document.getElementById("lobby-coins").innerText = userData.coins || 0;
            document.getElementById("lobby-diamonds").innerText = userData.diamonds || 0;
            document.getElementById("prof-name").innerText = userData.username || "User";
            document.getElementById("prof-uid").innerText = "UID: " + (userData.uid || "------");
            document.getElementById("prof-level").innerText = userData.level || 1;
            document.getElementById("lobby-character").innerText = userData.currentItems?.char || "🏀🏃‍♀️";
        }

        /* --- Real-Time Group Invitation System Mechanics Logic --- */
        function inviteFriendToGroupRoom(friendFirebaseKey) {
            if(!currentGroupId) {
                currentGroupId = "ROOM_" + Math.floor(100000 + Math.random() * 900000);
                database.ref('users/' + currentFirebaseUserKey).update({ currentGroupId: currentGroupId });
                database.ref('groups/' + currentGroupId).set({ leader: currentFirebaseUserKey, gameStarted: false });
            }

            database.ref('groupInvites/' + friendFirebaseKey).set({
                groupId: currentGroupId,
                senderName: userData.username,
                senderKey: currentFirebaseUserKey
            }).then(() => {
                alert("Group invite sent to your friend! ✉");
            });
        }

        function acceptGroupInvite() {
            if(incomingInviteData) {
                let targetRoomId = incomingInviteData.groupId;
                database.ref('users/' + currentFirebaseUserKey).update({ currentGroupId: targetRoomId });
                database.ref('groups/' + targetRoomId + '/members/' + currentFirebaseUserKey).set(true);
                database.ref('groupInvites/' + currentFirebaseUserKey).remove();
            }
        }

        function rejectGroupInvite() {
            database.ref('groupInvites/' + currentFirebaseUserKey).remove();
        }

        function leaveCurrentGroup() {
            if(currentGroupId) {
                database.ref('users/' + currentFirebaseUserKey).update({ currentGroupId: "" });
                database.ref('groups/' + currentGroupId + '/members/' + currentFirebaseUserKey).remove();
                currentGroupId = "";
            }
        }

        function listenToGroupGameStatus(roomId) {
            database.ref('groups/' + roomId).on('value', (snapshot) => {
                if(snapshot.exists()) {
                    let room = snapshot.val();
                    if(room.gameStarted && !document.getElementById("game-screen").classList.contains("active")) {
                        startGameCountdown();
                    }
                }
            });
        }

        function triggerStartGameAction() {
            if(currentGroupId) {
                database.ref('groups/' + currentGroupId).once('value', (snapshot) => {
                    if(snapshot.exists() && snapshot.val().leader === currentFirebaseUserKey) {
                        database.ref('groups/' + currentGroupId).update({ gameStarted: true });
                    } else {
                        alert("Only the Squad Leader can start the match! 👑");
                    }
                });
            } else {
                startGameCountdown();
            }
        }

        /* --- Social & Friends List Mechanics --- */
        function renderLobbyFriendsList() {
            const container = document.getElementById("lobby-friends-container");
            container.innerHTML = "";
            if(!userData.friends || Object.keys(userData.friends).length === 0) {
                container.innerHTML = "<p style='text-align:center;font-size:10px;color:#7f8c8d;'>No Friends</p>"; return;
            }
            Object.keys(userData.friends).forEach(key => {
                let f = userData.friends[key];
                let row = document.createElement("div");
                row.className = "friend-row-item";
                row.innerHTML = `
                    <div>
                        <p style='color:yellow;font-weight:bold;'>${f.username}</p>
                        <small style='font-size:9px;color:#ccc;'>UID:${f.uid}</small>
                    </div>
                    <button class="invite-friend-btn" onclick="inviteFriendToGroupRoom('${key}')">+</button>
                `;
                container.appendChild(row);
            });
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openAddFriendModal() {
            document.getElementById("friend-search-input").value = "";
            document.getElementById("social-profile-card").style.display = "none";
            document.getElementById("add-friend-modal").style.display = "block";
        }

        function searchUserSocial() {
            const query = document.getElementById("friend-search-input").value.trim().toLowerCase();
            if(!query) { alert("Enter Name or UID!"); return; }

            database.ref('users').once('value', (snapshot) => {
                if(snapshot.exists()) {
                    let targetKey = null, targetData = null;
                    snapshot.forEach(child => {
                        let val = child.val();
                        if(val.uid === query || (val.username && val.username.toLowerCase() === query)) {
                            targetKey = child.key; targetData = child.val();
                        }
                    });

                    if(targetKey) {
                        if(targetKey === currentFirebaseUserKey) { alert("You can't search yourself!"); return; }
                        document.getElementById("social-name").innerText = targetData.username;
                        document.getElementById("social-uid").innerText = "UID: " + targetData.uid;
                        document.getElementById("social-level").innerText = targetData.level || 1;
                        document.getElementById("social-likes-count").innerText = targetData.likes || 0;

                        document.getElementById("social-like-btn").onclick = () => {
                            database.ref('users/' + targetKey + '/likes').transaction(c => (c || 0) + 1);
                            alert("Liked! 👍"); searchUserSocial();
                        };
                        document.getElementById("social-request-btn").onclick = () => {
                            database.ref('users/' + targetKey + '/requests/' + currentFirebaseUserKey).set({
                                uid: userData.uid, username: userData.username
                            });
                            alert("Friend request sent!");
                        };
                        document.getElementById("social-profile-card").style.display = "flex";
                    } else { alert("User not found!"); }
                }
            });
        }

        function openRequestsModal() {
            document.getElementById("requests-modal").style.display = "block";
            const reqContainer = document.getElementById("requests-container-list");
            reqContainer.innerHTML = "";
            if(!userData.requests) { reqContainer.innerHTML = "<p style='text-align:center;color:#aaa;'>No requests</p>"; return; }

            Object.keys(userData.requests).forEach(senderKey => {
                let reqItem = userData.requests[senderKey];
                let row = document.createElement("div");
                row.className = "req-item-box";
                row.innerHTML = `
                    <div><p>${reqItem.username}</p><small>UID: ${reqItem.uid}</small></div>
                    <button class="action-inline-btn" onclick="acceptRequest('${senderKey}')">ACCEPT</button>
                `;
                reqContainer.appendChild(row);
            });
        }

        function acceptRequest(senderKey) {
            let reqItem = userData.requests[senderKey];
            database.ref('users/' + senderKey + '/friends/' + currentFirebaseUserKey).set({ uid: userData.uid, username: userData.username });
            database.ref('users/' + currentFirebaseUserKey + '/friends/' + senderKey).set({ uid: reqItem.uid, username: reqItem.username });
            database.ref('users/' + currentFirebaseUserKey + '/requests/' + senderKey).remove().then(() => {
                alert("Friend Added!"); closeModal('requests-modal');
            });
        }

        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        /* --- Engine Core Game Grid System --- */
        let gameScore = 0, targetScore = 6, playerIndex = 2, totalBoxes = 36;

        function startGameCountdown() {
            showScreen("game-screen");
            const overlay = document.getElementById("countdown-overlay");
            overlay.style.display = "flex";
            let count = 3; overlay.innerText = count;
            let countInterval = setInterval(() => {
                count--;
                if(count > 0) overlay.innerText = count;
                else { 
                    clearInterval(countInterval); 
                    overlay.style.display = "none"; 
                    initGameBoard(); 
                }
            }, 1000);
        }

        function initGameBoard() {
            gameScore = 0;
            document.getElementById("game-score").innerText = gameScore;
            document.getElementById("target-score").innerText = targetScore;
            document.getElementById("game-current-level").innerText = userData.level || 7;
            playerIndex = 2;
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById("game-grid"); grid.innerHTML = "";
            let obstacleIndex = 14; let appleIndex = 21;
            for (let i = 0; i < totalBoxes; i++) {
                const box = document.createElement("div"); box.className = "grid-box";
                if (i === playerIndex) box.innerText = "🤹‍♀️";
                else if (i === obstacleIndex) box.innerText = "🗿";
                else if (i === appleIndex) box.innerText = "🍏";
                box.onclick = () => handleBoxClick(i, box.innerText);
                grid.appendChild(box);
            }
        }

        function handleBoxClick(clickedIndex, content) {
            if (content === "🍏") {
                gameScore++; document.getElementById("game-score").innerText = gameScore;
                if (gameScore >= targetScore) {
                    userData.level++; 
                    if(currentFirebaseUserKey) database.ref('users/' + currentFirebaseUserKey).update({level: userData.level});
                    alert("Level Complete! 🎉"); exitGame();
                } else { playerIndex = clickedIndex; renderGrid(); }
            } else if (content === "🗿") {
                alert("Game Over! 💥"); exitGame();
            } else { playerIndex = clickedIndex; renderGrid(); }
        }

        function exitGame() {
            if(currentGroupId) {
                database.ref('groups/' + currentGroupId).update({ gameStarted: false });
            }
            showScreen("lobby-screen");
        }

        function openStore() { document.getElementById("store-modal").style.display = "block"; }
        function openMissions() { document.getElementById("mission-modal").style.display = "block"; }
    </script>
</body>
</html>
