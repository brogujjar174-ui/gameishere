<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MA - God Mode Game</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0f171e; color: white; }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .active { display: flex; }

        /* Auth Screen */
        #auth-screen { flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #2c3e50, #000000); }
        .form-container { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); width: 90%; max-width: 340px; text-align: center; }
        .form-container h1 { margin-bottom: 15px; color: #00ffcc; letter-spacing: 2px; }
        .auth-tabs { display: flex; margin-bottom: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 4px; }
        .auth-tab-btn { flex: 1; padding: 8px; background: none; border: none; color: #ccc; cursor: pointer; font-weight: bold; }
        .auth-tab-btn.active-tab { background: #00ffcc; color: black; border-radius: 6px; }
        .form-container input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; outline: none; }
        .submit-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: #00ffcc; color: black; font-weight: bold; cursor: pointer; }

        /* Lobby Layout */
        #lobby-screen { background: radial-gradient(circle, #2c3e50, #0f171e); flex-direction: column; position: relative; }
        .top-nav { display: flex; justify-content: space-between; width: 100%; padding: 15px; position: absolute; top: 0; z-index: 10; }
        .profile-card { background: rgba(0,0,0,0.6); border-radius: 12px; border: 1.5px solid #00ffcc; width: 150px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .banner-bg { height: 45px; display: flex; align-items: center; justify-content: center; font-size: 22px; background: rgba(255,255,255,0.1); }
        .profile-name { position: absolute; top: 2px; width: 100%; text-align: center; font-size: 11px; color: yellow; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .profile-uid { position: absolute; bottom: 25px; width: 100%; text-align: center; font-size: 10px; color: #fff; }
        .avatar-container { padding: 4px; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.4); }
        .avatar-box { font-size: 20px; background: rgba(255,255,255,0.1); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .level-txt { font-size: 9px; font-weight: bold; color: #00ffcc; }

        .currencies { display: flex; flex-direction: column; gap: 6px; }
        .currency-box { background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; border: 1px solid #444; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 5px; }

        /* Squad Live Rendering Stage Area */
        .squad-stage-zone { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 20px; justify-content: center; align-items: center; width: 90%; z-index: 3; }
        .squad-member-wrapper { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .squad-member-char { font-size: 65px; text-shadow: 0 0 15px rgba(0,255,204,0.4); animation: float 3s ease-in-out infinite; }
        .squad-member-name { background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; color: #00ffcc; border: 1px solid #444; margin-top: 5px; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .group-status-bar { position: absolute; top: 100px; left: 15px; background: rgba(0, 153, 255, 0.5); border: 1px solid #0099ff; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; z-index: 10; }
        .left-menu { position: absolute; left: 15px; top: 150px; display: flex; flex-direction: column; gap: 10px; z-index: 5; }
        .menu-btn { padding: 10px 14px; font-size: 12px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #e74c3c; color: white; min-width: 95px; text-align: center; }
        .menu-btn.mission { background: #2ecc71; }

        .friends-list-panel { position: absolute; right: 15px; top: 150px; width: 140px; max-height: 220px; background: rgba(0,0,0,0.6); border: 1px solid #34495e; border-radius: 10px; padding: 6px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; z-index: 5; }
        .friends-panel-header { font-size: 10px; font-weight: bold; color: #00ffcc; text-align: center; border-bottom: 1px solid #444; padding-bottom: 4px; }
        .friend-row-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 6px; font-size: 10px; }
        .invite-friend-btn { padding: 2px 6px; background: #00ffcc; border: none; color: black; font-weight: bold; border-radius: 4px; cursor: pointer; }

        .bottom-nav { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; z-index: 10; }
        .start-btn { padding: 12px 35px; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; background: linear-gradient(45deg, #f1c40f, #f39c12); color: black; cursor: pointer; box-shadow: 0 0 15px #f1c40f; }
        .right-action-cluster { display: flex; flex-direction: column; gap: 6px; }
        .action-cluster-btn { padding: 8px 10px; font-size: 10px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; width: 100px; text-align: center; }

        /* Modals & Tab Navigation Designs */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c2833; border: 2px solid #00ffcc; border-radius: 15px; width: 90%; max-width: 380px; max-height: 70vh; overflow-y: auto; padding: 15px; z-index: 100; box-shadow: 0 0 25px rgba(0,0,0,0.7); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #34495e; padding-bottom: 6px; }
        .modal-tabs { display: flex; gap: 5px; margin-bottom: 10px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 6px; }
        .modal-tab-btn { flex: 1; padding: 6px; font-size: 11px; background: none; border: none; color: #aaa; font-weight: bold; cursor: pointer; }
        .modal-tab-btn.active-mode { background: #34495e; color: #00ffcc; border-radius: 4px; }
        
        .grid-items-layout { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .shop-bag-card { background: rgba(255,255,255,0.04); border: 1px solid #444; border-radius: 8px; padding: 10px; text-align: center; }
        .shop-bag-card.active-equipped { border-color: #00ffcc; background: rgba(0,255,204,0.08); }

        /* Game Board Area Grid System */
        #game-screen { background: #0a0a0a; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .game-header { width: 100%; max-width: 340px; display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; font-weight: bold; color: #00ffcc; }
        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; width: 100%; max-width: 340px; background: #141414; padding: 6px; border-radius: 8px; border: 1px solid #333; }
        .grid-box { background: #222; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; aspect-ratio: 1; }

        .invite-received-dialog { display: none; position: fixed; bottom: 20px; left: 5%; width: 90%; max-width: 340px; background: #1a252f; border: 2px solid #3498db; padding: 12px; border-radius: 10px; z-index: 500; flex-direction: column; gap: 8px; }
        #countdown-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; font-size:80px; font-weight:bold; color:#fff; z-index:200; }
        .mission-row { background: rgba(0,0,0,0.3); border: 1px solid #444; border-radius: 6px; padding: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="countdown-overlay">3</div>

    <div id="store-modal" class="modal">
        <div class="modal-header">
            <h3>GAME MARKET 🛒</h3>
            <button class="close-modal" onclick="closeModal('store-modal')">✖</button>
        </div>
        <div class="modal-tabs">
            <button class="modal-tab-btn active-mode" id="btn-store-char" onclick="changeStoreTab('char')">HEROES</button>
            <button class="modal-tab-btn" id="btn-store-avatar" onclick="changeStoreTab('avatar')">AVATARS</button>
            <button class="modal-tab-btn" id="btn-store-banner" onclick="changeStoreTab('banner')">BANNERS</button>
        </div>
        <div class="grid-items-layout" id="store-items-grid"></div>
    </div>

    <div id="bag-modal" class="modal">
        <div class="modal-header">
            <h3>MY BAG 🎒</h3>
            <button class="close-modal" onclick="closeModal('bag-modal')">✖</button>
        </div>
        <div class="modal-tabs">
            <button class="modal-tab-btn active-mode" id="btn-bag-char" onclick="changeBagTab('char')">HEROES</button>
            <button class="modal-tab-btn" id="btn-bag-avatar" onclick="changeBagTab('avatar')">AVATARS</button>
            <button class="modal-tab-btn" id="btn-bag-banner" onclick="changeBagTab('banner')">BANNERS</button>
        </div>
        <div class="grid-items-layout" id="bag-items-grid"></div>
    </div>

    <div id="mission-modal" class="modal">
        <div class="modal-header">
            <h3>DAILY MISSIONS 📜</h3>
            <button class="close-modal" onclick="closeModal('mission-modal')">✖</button>
        </div>
        <div id="missions-container-list"></div>
    </div>

    <div id="add-friend-modal" class="modal">
        <div class="modal-header">
            <h3>FIND FRIENDS 🔍</h3>
            <button class="close-modal" onclick="closeModal('add-friend-modal')">✖</button>
        </div>
        <div class="search-wrapper">
            <input type="text" id="friend-search-input" placeholder="Name or 6-digit UID...">
            <button class="action-inline-btn" style="background:#00ffcc; color:black; padding:0 10px; border:none; border-radius:6px;" onclick="searchUserSocial()">SEARCH</button>
        </div>
        <div class="profile-preview-card" id="social-profile-card">
            <div class="profile-card" style="align-self:center; margin-bottom:10px;">
                <div class="banner-bg" id="social-banner">🎟</div>
                <div class="profile-name" id="social-name">User</div>
                <div class="profile-uid" id="social-uid">UID: ------</div>
                <div class="avatar-container">
                    <div class="avatar-box" id="social-avatar">🍁</div>
                    <div class="level-txt"><span>LVL</span> <span id="social-level">1</span></div>
                </div>
            </div>
            <div class="like-counter-badge">👍 Likes: <span id="social-likes-count">0</span></div>
            <div style="display:flex; gap:6px; width:100%;">
                <button class="action-inline-btn" style="flex:1; background:#f1c40f;" id="social-like-btn">LIKE</button>
                <button class="action-inline-btn" style="flex:1; background:#3498db;" id="social-request-btn">ADD</button>
            </div>
        </div>
    </div>

    <div id="requests-modal" class="modal">
        <div class="modal-header">
            <h3>REQUESTS 📥</h3>
            <button class="close-modal" onclick="closeModal('requests-modal')">✖</button>
        </div>
        <div id="requests-container-list"></div>
    </div>

    <div id="group-invite-dialog" class="invite-received-dialog">
        <p id="group-invite-text" style="font-size:12px; font-weight:bold; color:#00ffcc;"></p>
        <div style="display:flex; gap:8px;">
            <button class="action-inline-btn" style="background:#e74c3c; flex:1;" onclick="rejectGroupInvite()">REJECT</button>
            <button class="action-inline-btn" style="background:#2ecc71; flex:1;" onclick="acceptGroupInvite()">ACCEPT</button>
        </div>
    </div>

    <div id="auth-screen" class="screen active">
        <div class="form-container">
            <h1>MA GAME</h1>
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab-btn active-tab" onclick="switchAuthMode('login')">LOGIN</button>
                <button id="tab-signup" class="auth-tab-btn" onclick="switchAuthMode('signup')">SIGN UP</button>
            </div>
            <input type="text" id="auth-username" placeholder="Username (Sign Up Only)" style="display: none;">
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password">
            <button class="submit-btn" id="auth-submit-btn" onclick="handleAuthSubmit()">LOG IN & PLAY</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="top-nav">
            <div class="profile-card">
                <div class="banner-bg" id="prof-banner">🎟</div>
                <div class="profile-name" id="prof-name">User</div>
                <div class="profile-uid" id="prof-uid">UID: ------</div>
                <div class="avatar-container">
                    <div class="avatar-box" id="prof-avatar">🍁</div>
                    <div class="level-txt"><span>LVL</span> <span id="prof-level" style="color:#ffcc00;">1</span></div>
                </div>
            </div>
            <div class="currencies">
                <div class="currency-box">🪙 <span id="lobby-coins">0</span></div>
                <div class="currency-box">💎 <span id="lobby-diamonds">0</span></div>
            </div>
        </div>

        <div class="group-status-bar" id="group-status-panel">Squad Room Active 👥</div>

        <div class="squad-stage-zone" id="squad-stage-render-box"></div>

        <div class="left-menu">
            <button class="menu-btn" onclick="openStore()">STORE 🛒</button>
            <button class="menu-btn mission" onclick="openMissions()">MISSION 📜</button>
            <button class="menu-btn" id="leave-group-btn" style="background:#7f8c8d; display:none;" onclick="leaveCurrentGroup()">LEAVE SQUAD</button>
        </div>

        <div class="friends-list-panel">
            <div class="friends-panel-header">FRIENDS LIST 👥</div>
            <div id="lobby-friends-container" style="display:flex; flex-direction:column; gap:4px;"></div>
        </div>

        <div class="bottom-nav">
            <button class="menu-btn" style="background:#9b59b6; min-width:90px;" onclick="openBagModal()">BAG 🎒</button>
            <button class="start-btn" id="main-start-btn" onclick="triggerStartGameAction()">START 🚀</button>
            <div class="right-action-cluster">
                <button class="action-cluster-btn" style="background:#2ecc71;" onclick="openAddFriendModal()">ADD FRIEND 👤</button>
                <button class="action-cluster-btn" style="background:#e67e22;" onclick="openRequestsModal()">REQUESTS 🔔</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <div>Apple: <span id="game-score">0</span> / <span id="target-score">12</span></div>
            <div>Level: <span id="game-current-level">1</span></div>
        </div>
        <div class="grid-container" id="game-grid"></div>
        <button class="menu-btn" style="margin-top:15px; background:#e74c3c;" onclick="exitGame()">EXIT LOBBY</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAJGU-ZX2GFOek8hteak0UPPYPQP_e1arY",
            authDomain: "triple-ae17f.firebaseapp.com",
            databaseURL: "https://triple-ae17f-default-rtdb.firebaseio.com",
            projectId: "triple-ae17f",
            storageBucket: "triple-ae17f.firebasestorage.app",
            messagingSenderId: "1054581990158",
            appId: "1:1054581990158:web:c7cf28f432e826baa12d5f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentAuthMode = "login"; 
        let currentFirebaseUserKey = "";
        let currentGroupId = ""; 
        let currentStoreTab = "char";
        let currentBagTab = "char";
        let incomingInviteData = null;

        let userData = {
            username: "", uid: "", coins: 100, diamonds: 520, level: 1, likes: 0,
            currentItems: { char: "🏀🏃‍♀️", avatar: "🍁", banner: "🎟" },
            unlockedItems: ["char_default", "avatar_default", "banner_default"],
            friends: {}, requests: {}, currentGroupId: "", missionsClaimed: {}
        };

        const globalItemsCatalog = {
            char: [
                { id: "char_default", name: "Runner Girl", emoji: "🏀🏃‍♀️", costCoins: 0, costDiamonds: 0 },
                { id: "char_ninja", name: "Ninja Guy", emoji: "🥷", costCoins: 200, costDiamonds: 0 },
                { id: "char_astro", name: "Astronaut", emoji: "👨‍🚀", costCoins: 0, costDiamonds: 50 },
                { id: "char_clown", name: "Juggler Boy", emoji: "🤹‍♀️", costCoins: 150, costDiamonds: 10 }
            ],
            avatar: [
                { id: "avatar_default", name: "Maple Leaf", emoji: "🍁", costCoins: 0, costDiamonds: 0 },
                { id: "avatar_bolt", name: "Lightning", emoji: "⚡", costCoins: 100, costDiamonds: 0 },
                { id: "avatar_fire", name: "Fire Ball", emoji: "🔥", costCoins: 0, costDiamonds: 30 }
            ],
            banner: [
                { id: "banner_default", name: "Classic Slate", emoji: "🎟", costCoins: 0, costDiamonds: 0 },
                { id: "banner_gold", name: "Golden Aura", emoji: "👑", costCoins: 300, costDiamonds: 0 },
                { id: "banner_neon", name: "Neon Matrix", emoji: "👾", costCoins: 0, costDiamonds: 80 }
            ]
        };

        const staticMissionsList = [
            { id: "m1", desc: "Play 1 Game Match", rewardCoins: 50, rewardDiamonds: 5 },
            { id: "m2", desc: "Reach Player Level 3", rewardCoins: 100, rewardDiamonds: 10 },
            { id: "m3", desc: "Gain 5 Profile Likes", rewardCoins: 150, rewardDiamonds: 15 }
        ];

        let audioCtx = null;
        function playTone(freq, type, duration) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }
        function playClickSound() { playTone(600, 'sine', 0.08); }
        function playWinSound() { playTone(580, 'triangle', 0.15); setTimeout(() => playTone(880, 'triangle', 0.25), 120); }
        function playLoseSound() { playTone(280, 'sawtooth', 0.2); }

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentFirebaseUserKey = user.uid;
                setupSyncListener(currentFirebaseUserKey);
            } else { showScreen("auth-screen"); }
        });

        function switchAuthMode(mode) {
            playClickSound();
            currentAuthMode = mode;
            document.querySelectorAll('.auth-tab-btn').forEach(b => b.classList.remove('active-tab'));
            if (mode === "login") {
                document.getElementById("tab-login").classList.add('active-tab');
                document.getElementById("auth-username").style.display = "none";
                document.getElementById("auth-submit-btn").innerText = "LOG IN & PLAY";
            } else {
                document.getElementById("tab-signup").classList.add('active-tab');
                document.getElementById("auth-username").style.display = "block";
                document.getElementById("auth-submit-btn").innerText = "CREATE ACCOUNT";
            }
        }

        function handleAuthSubmit() {
            playClickSound();
            const email = document.getElementById("auth-email").value.trim();
            const pass = document.getElementById("auth-password").value.trim();
            const name = document.getElementById("auth-username").value.trim();
            if (!email || !pass) { alert("Fill all entries!"); return; }

            if (currentAuthMode === "signup") {
                if (!name) { alert("Provide a username!"); return; }
                auth.createUserWithEmailAndPassword(email, pass).then((userCredential) => {
                    const randomUID = Math.floor(100000 + Math.random() * 900000).toString();
                    currentFirebaseUserKey = userCredential.user.uid;
                    userData.username = name;
                    userData.uid = randomUID;
                    userData.currentGroupId = "";
                    userData.unlockedItems = ["char_default", "avatar_default", "banner_default"];
                    database.ref('users/' + currentFirebaseUserKey).set(userData);
                }).catch(error => alert(error.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass).catch(error => alert(error.message));
            }
        }

        function setupSyncListener(firebaseUid) {
            database.ref('users/' + firebaseUid).on('value', (snapshot) => {
                if(snapshot.exists()) {
                    userData = snapshot.val();
                    if(!userData.unlockedItems) userData.unlockedItems = ["char_default", "avatar_default", "banner_default"];
                    updateLobbyUI();
                    renderLobbyFriendsList();
                    
                    if(userData.currentGroupId) {
                        currentGroupId = userData.currentGroupId;
                        document.getElementById("group-status-panel").style.display = "block";
                        document.getElementById("leave-group-btn").style.display = "block";
                        listenToGroupDynamicRoom(userData.currentGroupId);
                    } else {
                        currentGroupId = "";
                        document.getElementById("group-status-panel").style.display = "none";
                        document.getElementById("leave-group-btn").style.display = "none";
                        renderSingleLobbyCharacter();
                    }
                    showScreen("lobby-screen");
                }
            });

            database.ref('groupInvites/' + firebaseUid).on('value', (snapshot) => {
                if(snapshot.exists()) {
                    incomingInviteData = snapshot.val();
                    document.getElementById("group-invite-text").innerText = `${incomingInviteData.senderName} invited you!`;
                    document.getElementById("group-invite-dialog").style.display = "flex";
                } else { document.getElementById("group-invite-dialog").style.display = "none"; }
            });
        }

        function updateLobbyUI() {
            document.getElementById("lobby-coins").innerText = userData.coins || 0;
            document.getElementById("lobby-diamonds").innerText = userData.diamonds || 0;
            document.getElementById("prof-name").innerText = userData.username || "User";
            document.getElementById("prof-uid").innerText = "UID: " + (userData.uid || "------");
            document.getElementById("prof-level").innerText = userData.level || 1;
            document.getElementById("prof-avatar").innerText = userData.currentItems?.avatar || "🍁";
            document.getElementById("prof-banner").innerText = userData.currentItems?.banner || "🎟";
        }

        function renderSingleLobbyCharacter() {
            const stage = document.getElementById("squad-stage-render-box");
            stage.innerHTML = `
                <div class="squad-member-wrapper">
                    <div class="squad-member-char">${userData.currentItems?.char || "🏀🏃‍♀️"}</div>
                    <div class="squad-member-name">${userData.username}</div>
                </div>
            `;
        }

        /* --- Real-Time Live Shared Squad Room Syncing Loop Logic --- */
        function listenToGroupDynamicRoom(roomId) {
            database.ref('groups/' + roomId).on('value', (snapshot) => {
                if(snapshot.exists()) {
                    let room = snapshot.val();
                    
                    // Render multi-users loop within the lobby stage area box dynamically
                    const stage = document.getElementById("squad-stage-render-box");
                    stage.innerHTML = "";

                    // Track leader profile info
                    database.ref('users/' + room.leader).once('value', (uSnap) => {
                        if(uSnap.exists()) {
                            let data = uSnap.val();
                            appendMemberToStage(data.currentItems?.char || "🏀🏃‍♀️", data.username + " 👑");
                        }
                    });

                    // Track remaining members info loop
                    if(room.members) {
                        Object.keys(room.members).forEach(mKey => {
                            database.ref('users/' + mKey).once('value', (uSnap) => {
                                if(uSnap.exists()) {
                                    let data = uSnap.val();
                                    appendMemberToStage(data.currentItems?.char || "🏀🏃‍♀️", data.username);
                                }
                            });
                        });
                    }

                    if(room.gameStarted && !document.getElementById("game-screen").classList.contains("active")) {
                        startGameCountdown();
                    }
                }
            });
        }

        function appendMemberToStage(charEmoji, name) {
            const stage = document.getElementById("squad-stage-render-box");
            let wrapper = document.createElement("div");
            wrapper.className = "squad-member-wrapper";
            wrapper.innerHTML = `<div class="squad-member-char">${charEmoji}</div><div class="squad-member-name">${name}</div>`;
            stage.appendChild(wrapper);
        }

        function inviteFriendToGroupRoom(friendFirebaseKey) {
            playClickSound();
            if(!currentGroupId) {
                currentGroupId = "ROOM_" + Math.floor(100000 + Math.random() * 900000);
                database.ref('users/' + currentFirebaseUserKey).update({ currentGroupId: currentGroupId });
                database.ref('groups/' + currentGroupId).set({ leader: currentFirebaseUserKey, gameStarted: false });
            }
            database.ref('groupInvites/' + friendFirebaseKey).set({
                groupId: currentGroupId, senderName: userData.username
            });
            alert("Invite Sent!");
        }

        function acceptGroupInvite() {
            if(incomingInviteData) {
                let rId = incomingInviteData.groupId;
                database.ref('users/' + currentFirebaseUserKey).update({ currentGroupId: rId });
                database.ref('groups/' + rId + '/members/' + currentFirebaseUserKey).set(true);
                database.ref('groupInvites/' + currentFirebaseUserKey).remove();
            }
        }

        function rejectGroupInvite() { database.ref('groupInvites/' + currentFirebaseUserKey).remove(); }

        function leaveCurrentGroup() {
            if(currentGroupId) {
                database.ref('users/' + currentFirebaseUserKey).update({ currentGroupId: "" });
                database.ref('groups/' + currentGroupId + '/members/' + currentFirebaseUserKey).remove();
                currentGroupId = "";
            }
        }

        function triggerStartGameAction() {
            if(currentGroupId) {
                database.ref('groups/' + currentGroupId).once('value', (s) => {
                    if(s.exists() && s.val().leader === currentFirebaseUserKey) {
                        database.ref('groups/' + currentGroupId).update({ gameStarted: true });
                    } else { alert("Only squad leaders can start matches! 👑"); }
                });
            } else { startGameCountdown(); }
        }

        /* --- Custom Tab Categorized Shop / Market Logic --- */
        function openStore() { playClickSound(); document.getElementById("store-modal").style.display = "block"; changeStoreTab("char"); }
        function changeStoreTab(tab) {
            currentStoreTab = tab;
            document.querySelectorAll('#store-modal .modal-tab-btn').forEach(b => b.classList.remove('active-mode'));
            if(tab === 'char') document.getElementById('btn-store-char').classList.add('active-mode');
            if(tab === 'avatar') document.getElementById('btn-store-avatar').classList.add('active-mode');
            if(tab === 'banner') document.getElementById('btn-store-banner').classList.add('active-mode');
            renderStoreGrid();
        }

        function renderStoreGrid() {
            const grid = document.getElementById("store-items-grid"); grid.innerHTML = "";
            globalItemsCatalog[currentStoreTab].forEach(item => {
                let isOwned = userData.unlockedItems?.includes(item.id);
                let div = document.createElement("div");
                div.className = "shop-bag-card";
                div.innerHTML = `
                    <div style="font-size:32px;">${item.emoji}</div>
                    <p style="font-size:11px; font-weight:bold;">${item.name}</p>
                    <button style="margin-top:6px; font-size:10px; padding:3px 8px; border:none; border-radius:4px; background:${isOwned?'#7f8c8d':'#f1c40f'}; color:black; font-weight:bold;" ${isOwned?'disabled':''}>
                        ${isOwned ? 'OWNED' : (item.costCoins > 0 ? `🪙 ${item.costCoins}` : `💎 ${item.costDiamonds}`)}
                    </button>
                `;
                div.onclick = () => { if(!isOwned) buyStoreItemField(item); };
                grid.appendChild(div);
            });
        }

        function buyStoreItemField(item) {
            playClickSound();
            if(item.costCoins > 0 && (userData.coins || 0) < item.costCoins) { alert("Insufficient Coins!"); return; }
            if(item.costDiamonds > 0 && (userData.diamonds || 0) < item.costDiamonds) { alert("Insufficient Diamonds!"); return; }

            if(item.costCoins > 0) userData.coins -= item.costCoins;
            if(item.costDiamonds > 0) userData.diamonds -= item.costDiamonds;
            
            if(!userData.unlockedItems) userData.unlockedItems = ["char_default", "avatar_default", "banner_default"];
            userData.unlockedItems.push(item.id);

            database.ref('users/' + currentFirebaseUserKey).update({
                coins: userData.coins, diamonds: userData.diamonds, unlockedItems: userData.unlockedItems
            }).then(() => { renderStoreGrid(); });
        }

        /* --- Custom Tab Categorized Bag Logic --- */
        function openBagModal() { playClickSound(); document.getElementById("bag-modal").style.display = "block"; changeBagTab("char"); }
        function changeBagTab(tab) {
            currentBagTab = tab;
            document.querySelectorAll('#bag-modal .modal-tab-btn').forEach(b => b.classList.remove('active-mode'));
            if(tab === 'char') document.getElementById('btn-bag-char').classList.add('active-mode');
            if(tab === 'avatar') document.getElementById('btn-bag-avatar').classList.add('active-mode');
            if(tab === 'banner') document.getElementById('btn-bag-banner').classList.add('active-mode');
            renderBagGrid();
        }

        function renderBagGrid() {
            const grid = document.getElementById("bag-items-grid"); grid.innerHTML = "";
            globalItemsCatalog[currentBagTab].forEach(item => {
                let isOwned = userData.unlockedItems?.includes(item.id);
                if(isOwned) {
                    let isEquipped = false;
                    if(currentBagTab === 'char' && userData.currentItems?.char === item.emoji) isEquipped = true;
                    if(currentBagTab === 'avatar' && userData.currentItems?.avatar === item.emoji) isEquipped = true;
                    if(currentBagTab === 'banner' && userData.currentItems?.banner === item.emoji) isEquipped = true;

                    let div = document.createElement("div");
                    div.className = `shop-bag-card ${isEquipped ? 'active-equipped':''}`;
                    div.innerHTML = `
                        <div style="font-size:32px;">${item.emoji}</div>
                        <p style="font-size:11px;">${item.name}</p>
                        <small style="color:#00ffcc; font-size:9px;">${isEquipped ? 'EQUIPPED':'CLICK EQUIP'}</small>
                    `;
                    div.onclick = () => { equipBagField(item); };
                    grid.appendChild(div);
                }
            });
        }

        function equipBagField(item) {
            playClickSound();
            if(!userData.currentItems) userData.currentItems = {};
            if(currentBagTab === 'char') userData.currentItems.char = item.emoji;
            if(currentBagTab === 'avatar') userData.currentItems.avatar = item.emoji;
            if(currentBagTab === 'banner') userData.currentItems.banner = item.emoji;

            database.ref('users/' + currentFirebaseUserKey + '/currentItems').set(userData.currentItems).then(() => {
                renderBagGrid();
            });
        }

        /* --- Missions Implementation Node --- */
        function openMissions() {
            playClickSound();
            document.getElementById("mission-modal").style.display = "block";
            const container = document.getElementById("missions-container-list"); container.innerHTML = "";
            
            staticMissionsList.forEach(m => {
                let isClaimed = userData.missionsClaimed?.[m.id] || false;
                let row = document.createElement("div");
                row.className = "mission-row";
                row.innerHTML = `
                    <div>
                        <p style="font-size:12px; font-weight:bold;">${m.desc}</p>
                        <small style="color:#f1c40f;">🪙+${m.rewardCoins} 💎+${m.rewardDiamonds}</small>
                    </div>
                    <button style="padding:4px 8px; font-size:10px; border:none; border-radius:4px; font-weight:bold; background:${isClaimed?'#7f8c8d':'#2ecc71'}; color:black;" ${isClaimed?'disabled':''}>
                        ${isClaimed ? 'CLAIMED' : 'CLAIM'}
                    </button>
                `;
                row.querySelector('button').onclick = () => claimMissionRewardsField(m);
                container.appendChild(row);
            });
        }

        function claimMissionRewardsField(m) {
            playClickSound();
            if(!userData.missionsClaimed) userData.missionsClaimed = {};
            userData.missionsClaimed[m.id] = true;
            userData.coins = (userData.coins || 0) + m.rewardCoins;
            userData.diamonds = (userData.diamonds || 0) + m.rewardDiamonds;

            database.ref('users/' + currentFirebaseUserKey).update({
                coins: userData.coins, diamonds: userData.diamonds, missionsClaimed: userData.missionsClaimed
            }).then(() => openMissions());
        }

        /* --- Social Elements Core Engine --- */
        function renderLobbyFriendsList() {
            const container = document.getElementById("lobby-friends-container"); container.innerHTML = "";
            if(!userData.friends) { container.innerHTML = "<p style='text-align:center;font-size:9px;color:#777;'>Empty</p>"; return; }
            Object.keys(userData.friends).forEach(k => {
                let f = userData.friends[k];
                let row = document.createElement("div"); row.className = "friend-row-item";
                row.innerHTML = `<div><p style='color:yellow;'>${f.username}</p></div><button class="invite-friend-btn" onclick="inviteFriendToGroupRoom('${k}')">+</button>`;
                container.appendChild(row);
            });
        }
        function openAddFriendModal() { playClickSound(); document.getElementById("add-friend-modal").style.display = "block"; }
        function openRequestsModal() { playClickSound(); document.getElementById("requests-modal").style.display = "block"; updateRequestsUI(); }
        function closeModal(id) { playClickSound(); document.getElementById(id).style.display = "none"; }

        function searchUserSocial() {
            playClickSound();
            const q = document.getElementById("friend-search-input").value.trim().toLowerCase();
            database.ref('users').once('value', (s) => {
                if(s.exists()) {
                    let tk = null, td = null;
                    s.forEach(c => { if(c.val().uid === q || c.val().username?.toLowerCase() === q) { tk=c.key; td=c.val(); } });
                    if(tk && tk !== currentFirebaseUserKey) {
                        document.getElementById("social-name").innerText = td.username;
                        document.getElementById("social-uid").innerText = "UID: " + td.uid;
                        document.getElementById("social-level").innerText = td.level || 1;
                        document.getElementById("social-likes-count").innerText = td.likes || 0;
                        document.getElementById("social-like-btn").onclick = () => { database.ref('users/'+tk+'/likes').transaction(c=>(c||0)+1); searchUserSocial(); };
                        document.getElementById("social-request-btn").onclick = () => { database.ref('users/'+tk+'/requests/'+currentFirebaseUserKey).set({uid:userData.uid, username:userData.username}); alert("Sent!"); };
                        document.getElementById("social-profile-card").style.display = "flex";
                    } else { alert("Not found/Self search error!"); }
                }
            });
        }

        function updateRequestsUI() {
            const box = document.getElementById("requests-container-list"); box.innerHTML = "";
            if(!userData.requests) { box.innerHTML = "<p style='text-align:center;font-size:11px;'>No Requests</p>"; return; }
            Object.keys(userData.requests).forEach(k => {
                let r = userData.requests[k];
                let d = document.createElement("div"); d.className = "req-item-box";
                d.innerHTML = `<p>${r.username}</p><button class="action-inline-btn" style="background:#00ffcc;color:black;" onclick="acceptRequest('${k}')">ACCEPT</button>`;
                box.appendChild(d);
            });
        }
        function acceptRequest(k) {
            playClickSound();
            let r = userData.requests[k];
            database.ref('users/'+k+'/friends/'+currentFirebaseUserKey).set({uid:userData.uid, username:userData.username});
            database.ref('users/'+currentFirebaseUserKey+'/friends/'+k).set({uid:r.uid, username:r.username});
            database.ref('users/'+currentFirebaseUserKey+'/requests/'+k).remove().then(()=>closeModal('requests-modal'));
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        /* --- Engine Core Scaling Math Game Board & Live Scoring Sync Loop --- */
        let gameScore = 0, targetScore = 12, playerIndex = 2, appleIndex = 21, obstacleIndex = 14, totalBoxes = 36;

        function startGameCountdown() {
            showScreen("game-screen");
            const overlay = document.getElementById("countdown-overlay");
            overlay.style.display = "flex";
            let c = 3; overlay.innerText = c;
            let timer = setInterval(() => {
                c--;
                if(c > 0) { overlay.innerText = c; playTone(440, 'sine', 0.1); }
                else { clearInterval(timer); overlay.style.display = "none"; initGameBoard(); }
            }, 1000);
        }

        function initGameBoard() {
            gameScore = 0;
            // Formula Matrix: target = previous_score (fixed floor value at 6 base) * level
            let levelBase = userData.level || 1;
            targetScore = 6 * levelBase; 

            document.getElementById("game-score").innerText = gameScore;
            document.getElementById("target-score").innerText = targetScore;
            document.getElementById("game-current-level").innerText = levelBase;
            
            playerIndex = 2;
            obstacleIndex = 14;
            generateRandomAppleLocation();

            if(currentGroupId) {
                // Clear out stale match dynamic scores
                database.ref('groups/' + currentGroupId + '/matchScore').set(0);
                listenToLiveSharedScores();
            } else {
                renderGrid();
            }
        }

        function generateRandomAppleLocation() {
            let possibleIndices = [];
            for(let i=0; i<totalBoxes; i++) {
                if(i !== playerIndex && i !== obstacleIndex) possibleIndices.push(i);
            }
            // Anti-repetition algorithm logic
            appleIndex = possibleIndices[Math.floor(Math.random() * possibleIndices.length)];
        }

        function listenToLiveSharedScores() {
            database.ref('groups/' + currentGroupId + '/matchScore').on('value', (snapshot) => {
                if(snapshot.exists()) {
                    gameScore = snapshot.val();
                    document.getElementById("game-score").innerText = gameScore;
                    
                    if(gameScore >= targetScore) {
                        database.ref('groups/' + currentGroupId + '/matchScore').off();
                        handleLevelCompletionSequence();
                    } else {
                        renderGrid();
                    }
                }
            });
        }

        function renderGrid() {
            const grid = document.getElementById("game-grid"); grid.innerHTML = "";
            let characterSkin = userData.currentItems?.char || "🏀🏃‍♀️";

            for (let i = 0; i < totalBoxes; i++) {
                const box = document.createElement("div"); box.className = "grid-box";
                if (i === playerIndex) box.innerText = characterSkin;
                else if (i === obstacleIndex) box.innerText = "🗿";
                else if (i === appleIndex) box.innerText = "🍏";
                box.onclick = () => handleBoxClick(i, box.innerText);
                grid.appendChild(box);
            }
        }

        function handleBoxClick(clickedIndex, content) {
            if (content === "🍏") {
                playWinSound();
                if(currentGroupId) {
                    // Update database room node value, triggering live score increment updates on all squad monitors instantly
                    database.ref('groups/' + currentGroupId + '/matchScore').transaction(c => (c || 0) + 1);
                    generateRandomAppleLocation();
                } else {
                    gameScore++;
                    document.getElementById("game-score").innerText = gameScore;
                    if (gameScore >= targetScore) {
                        handleLevelCompletionSequence();
                    } else {
                        playerIndex = clickedIndex;
                        generateRandomAppleLocation();
                        renderGrid();
                    }
                }
            } else if (content === "🗿") {
                playLoseSound();
                alert("Game Over! 💥"); exitGame();
            } else {
                playTone(500, 'sine', 0.04);
                playerIndex = clickedIndex; renderGrid();
            }
        }

        function handleLevelCompletionSequence() {
            userData.level++;
            userData.coins = (userData.coins || 0) + 30; // bonus loot coins distributed
            if(currentFirebaseUserKey) {
                database.ref('users/' + currentFirebaseUserKey).update({
                    level: userData.level, coins: userData.coins
                });
            }
            alert("Victory! Level Complete 🎉");
            exitGame();
        }

        function exitGame() {
            if(currentGroupId) {
                database.ref('groups/' + currentGroupId).update({ gameStarted: false });
                database.ref('groups/' + currentGroupId + '/matchScore').off();
            }
            showScreen("lobby-screen");
        }
    </script>
</body>
