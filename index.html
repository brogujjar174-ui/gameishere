<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA - The Game with Friends</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0f171e; color: white; }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .active { display: flex; }

        /* Auth Screen */
        #auth-screen { flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #2c3e50, #000000); }
        .form-container { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); width: 320px; text-align: center; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); }
        .form-container h1 { margin-bottom: 15px; color: #00ffcc; letter-spacing: 2px; font-size: 28px; }
        
        .auth-tabs { display: flex; margin-bottom: 15px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 4px; }
        .auth-tab-btn { flex: 1; padding: 8px; background: none; border: none; color: #ccc; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .auth-tab-btn.active-tab { background: #00ffcc; color: black; }

        .form-container input { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; outline: none; }
        .form-container button.submit-btn { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: #00ffcc; color: black; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* Lobby Screen */
        #lobby-screen { background: radial-gradient(circle, #2c3e50, #0f171e); flex-direction: column; position: relative; width: 100%; height: 100%; }
        .top-nav { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; padding: 15px; position: absolute; top: 0; left: 0; z-index: 10; }
        
        .profile-card { background: rgba(0,0,0,0.6); border-radius: 12px; border: 1.5px solid #00ffcc; width: 160px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .banner-bg { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; position: relative; background: rgba(255,255,255,0.1); }
        .profile-name { position: absolute; top: 2px; width: 100%; text-align: center; font-size: 12px; color: yellow; font-weight: bold; text-shadow: 1px 1px 3px #000; }
        .profile-uid { position: absolute; bottom: 2px; width: 100%; text-align: center; font-size: 10px; color: #fff; }
        .avatar-container { padding: 6px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); }
        .avatar-box { font-size: 24px; background: rgba(255,255,255,0.1); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid #aaa; }
        .level-txt { font-size: 11px; font-weight: bold; color: #00ffcc; display: flex; flex-direction: column; }

        .currencies { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .currency-box { background: rgba(0,0,0,0.7); padding: 6px 14px; border-radius: 20px; border: 1px solid #444; display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 15px; min-width: 100px; justify-content: flex-start; }

        .center-character { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%); font-size: 100px; text-shadow: 0px 0px 25px rgba(0,255,204,0.3); animation: float 3s ease-in-out infinite; z-index: 2; }
        @keyframes float { 0%, 100% { transform: translate(-50%, -48%); } 50% { transform: translate(-50%, -42%); } }

        .left-menu { position: absolute; left: 15px; top: 140px; display: flex; flex-direction: column; gap: 12px; z-index: 5; }
        .menu-btn { padding: 10px 20px; font-size: 14px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #e74c3c; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.4); text-align: center; min-width: 110px; }
        .menu-btn.mission { background: #2ecc71; }
        .menu-btn:hover { transform: scale(1.05); }

        /* Dynamic Friends Area (Replaced Admin Placement) */
        .friends-list-panel { position: absolute; right: 15px; top: 140px; width: 145px; max-height: 220px; background: rgba(0,0,0,0.6); border: 1px solid #34495e; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; z-index: 5; }
        .friends-panel-header { font-size: 11px; font-weight: bold; color: #00ffcc; text-align: center; border-bottom: 1px solid #444; padding-bottom: 4px; margin-bottom: 2px; }
        .friend-row-item { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); padding: 4px; border-radius: 6px; font-size: 11px; }

        .bottom-nav { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 10; }
        .start-btn { padding: 12px 35px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; background: linear-gradient(45deg, #f1c40f, #f39c12); color: black; cursor: pointer; box-shadow: 0 0 15px #f1c40f; }
        
        .right-action-cluster { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .action-cluster-btn { padding: 8px 16px; font-size: 12px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; width: 115px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }

        /* Modals */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1c2833; border: 2.5px solid #00ffcc; border-radius: 15px; width: 85%; max-width: 420px; max-height: 75vh; overflow-y: auto; padding: 20px; z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #34495e; padding-bottom: 8px; }
        .close-modal { font-size: 22px; cursor: pointer; background: none; border: none; color: white; }
        
        .shop-grid, .lib-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .shop-item, .lib-item { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #555; }
        .shop-item span, .lib-item span { font-size: 32px; display: block; margin-bottom: 8px; }
        .buy-item-btn, .equip-item-btn { padding: 6px 4px; font-size: 11px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .buy-item-btn { background: #3498db; color: white; }
        .equip-item-btn { background: #e67e22; color: white; }
        .equip-item-btn.equipped { background: #2ecc71; pointer-events: none; }

        .mission-item, .req-item-box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
        .claim-btn, .action-inline-btn { padding: 6px 12px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .claim-btn:disabled { background: #7f8c8d; cursor: not-allowed; }

        /* Search & Social Components */
        .search-wrapper { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-wrapper input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #555; background: rgba(0,0,0,0.3); color: white; outline: none; }
        .profile-preview-card { background: rgba(0,0,0,0.5); border-radius: 10px; padding: 15px; border: 1px dashed #00ffcc; text-align: center; display: none; flex-direction: column; align-items: center; }
        .like-counter-badge { margin: 8px 0; background: #34495e; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: #f1c40f; display: flex; align-items: center; gap: 4px; }

        /* Game Layout Fixes */
        #game-screen { background: #0a0a0a; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .game-header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; padding: 10px; font-size: 18px; font-weight: bold; color: #00ffcc; }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            grid-template-rows: repeat(6, 1fr); 
            gap: 4px; 
            width: 100%; 
            max-width: 400px; 
            height: auto;
            aspect-ratio: 9 / 6; 
            background: #1c1c1c; 
            padding: 6px; 
            border-radius: 8px; 
            border: 2px solid #444; 
        }
        .grid-box { background: #2a2a2a; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; width: 100%; height: 100%; }

        #countdown-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; font-size:100px; font-weight:bold; color:#fff; z-index:200; }
        .lib-nav { display: flex; gap: 8px; margin-bottom: 12px; }
        .lib-nav-btn { flex: 1; padding: 6px; background: #34495e; border: none; color: white; border-radius: 5px; cursor: pointer; font-size: 12px; }
        .lib-nav-btn.active-tab { background: #00ffcc; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div id="countdown-overlay">3</div>

    <!-- Store Modal -->
    <div id="store-modal" class="modal">
        <div class="modal-header">
            <h3>MA STORE 🛒</h3>
            <button class="close-modal" onclick="closeModal('store-modal')">✖</button>
        </div>
        <div class="shop-grid" id="store-items-container"></div>
    </div>

    <!-- Mission Modal -->
    <div id="mission-modal" class="modal">
        <div class="modal-header">
            <h3>MISSIONS 📜</h3>
            <button class="close-modal" onclick="closeModal('mission-modal')">✖</button>
        </div>
        <div id="missions-container"></div>
    </div>

    <!-- Library Modal -->
    <div id="library-modal" class="modal">
        <div class="modal-header">
            <h3>MY LIBRARY 🎒</h3>
            <button class="close-modal" onclick="closeModal('library-modal')">✖</button>
        </div>
        <div class="lib-nav">
            <button class="lib-nav-btn active-tab" id="tab-char-btn" onclick="switchLibTab('char')">Hero</button>
            <button class="lib-nav-btn" id="tab-avatar-btn" onclick="switchLibTab('avatar')">Avatar</button>
            <button class="lib-nav-btn" id="tab-banner-btn" onclick="switchLibTab('banner')">Banner</button>
        </div>
        <div class="lib-tabs" id="library-items-container"></div>
    </div>

    <!-- Add Friend & Profile Search Modal -->
    <div id="add-friend-modal" class="modal">
        <div class="modal-header">
            <h3>FIND FRIENDS 🔍</h3>
            <button class="close-modal" onclick="closeModal('add-friend-modal')">✖</button>
        </div>
        <div class="search-wrapper">
            <input type="text" id="friend-search-input" placeholder="Enter Name or 6-digit UID...">
            <button class="action-inline-btn" style="background:#00ffcc; color:black;" onclick="searchUserSocial()">SEARCH</button>
        </div>
        <div class="profile-preview-card" id="social-profile-card">
            <div class="profile-card" id="social-card-layout" style="transform: scale(1.1); margin-bottom:15px; margin-top:10px;">
                <div class="banner-bg" id="social-banner">🎟</div>
                <div class="profile-name" id="social-name">User</div>
                <div class="profile-uid" id="social-uid">UID: ------</div>
                <div class="avatar-container">
                    <div class="avatar-box" id="social-avatar">🍁</div>
                    <div class="level-txt"><span>LEVEL</span><span id="social-level" style="color:#ffcc00;">1</span></div>
                </div>
            </div>
            <div class="like-counter-badge">👍 Likes: <span id="social-likes-count">0</span></div>
            <div style="display:flex; gap:10px; width:100%; margin-top:10px;">
                <button class="action-inline-btn" style="flex:1; background:#f1c40f; color:black;" id="social-like-btn">LIKE 👍</button>
                <button class="action-inline-btn" style="flex:1; background:#3498db;" id="social-request-btn">ADD FRIEND ➕</button>
            </div>
        </div>
    </div>

    <!-- Friend Requests Box Modal -->
    <div id="requests-modal" class="modal">
        <div class="modal-header">
            <h3>FRIEND REQUESTS 📥</h3>
            <button class="close-modal" onclick="closeModal('requests-modal')">✖</button>
        </div>
        <div id="requests-container-list"></div>
    </div>

    <!-- Auth Screen Layout -->
    <div id="auth-screen" class="screen active">
        <div class="form-container">
            <h1>MA GAME</h1>
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab-btn active-tab" onclick="switchAuthMode('login')">LOGIN</button>
                <button id="tab-signup" class="auth-tab-btn" onclick="switchAuthMode('signup')">SIGN UP</button>
            </div>
            <input type="text" id="auth-username" placeholder="Username (For Sign Up Only)" style="display: none;">
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password">
            <button class="submit-btn" id="auth-submit-btn" onclick="handleAuthSubmit()">LOG IN & PLAY</button>
        </div>
    </div>

    <!-- Main Game Lobby Layout -->
    <div id="lobby-screen" class="screen">
        <div class="top-nav">
            <div class="profile-card">
                <div class="banner-bg" id="prof-banner">🎟</div>
                <div class="profile-name" id="prof-name">User</div>
                <div class="profile-uid" id="prof-uid">UID: ------</div>
                <div class="avatar-container">
                    <div class="avatar-box" id="prof-avatar">🍁</div>
                    <div class="level-txt"><span>LEVEL</span><span id="prof-level" style="color:#ffcc00;">1</span></div>
                </div>
            </div>
            <div class="currencies">
                <div class="currency-box">🪙 <span id="lobby-coins">0</span></div>
                <div class="currency-box">💎 <span id="lobby-diamonds">0</span></div>
            </div>
        </div>

        <!-- Center Active Avatar Hero Character -->
        <div class="center-character" id="lobby-character">😕</div>

        <!-- Left Actions -->
        <div class="left-menu">
            <button class="menu-btn" onclick="openStore()">STORE 🛒</button>
            <button class="menu-btn mission" onclick="openMissions()">MISSION 📜</button>
        </div>

        <!-- Friends List Dynamic Panel Panel Area (Replaced Admin) -->
        <div class="friends-list-panel">
            <div class="friends-panel-header">FRIENDS LIST 👥</div>
            <div id="lobby-friends-container" style="display:flex; flex-direction:column; gap:4px;">
                <!-- Real time approved friends appear here -->
            </div>
        </div>

        <!-- Bottom Social Action Navigation Cluster Layout -->
        <div class="bottom-nav">
            <button class="menu-btn" style="background:#9b59b6; min-width:100px;" onclick="openLibrary()">LIBRARY 🎒</button>
            <button class="start-btn" onclick="startGameCountdown()">START 🚀</button>
            
            <div class="right-action-cluster">
                <button class="action-cluster-btn" style="background:#2ecc71;" onclick="openAddFriendModal()">ADD FRIEND 👤</button>
                <button class="action-cluster-btn" style="background:#e67e22;" onclick="openRequestsModal()">REQUESTS 🔔</button>
            </div>
        </div>
    </div>

    <!-- Active Game Grid View Screen Layout -->
    <div id="game-screen" class="screen">
        <div class="game-header">
            <div>Apple: <span id="game-score">0</span> / <span id="target-score">6</span></div>
            <div>Level: <span id="game-current-level">1</span></div>
        </div>
        <div class="grid-container" id="game-grid"></div>
        <button class="menu-btn" style="margin-top:15px; background:#e74c3c;" onclick="exitGame()">EXIT LOBBY</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAJGU-ZX2GFOek8hteak0UPPYPQP_e1arY",
            authDomain: "triple-ae17f.firebaseapp.com",
            databaseURL: "https://triple-ae17f-default-rtdb.firebaseio.com",
            projectId: "triple-ae17f",
            storageBucket: "triple-ae17f.firebasestorage.app",
            messagingSenderId: "1054581990158",
            appId: "1:1054581990158:web:c7cf28f432e826baa12d5f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // AUDIO CONFIGS
        const audioLobby = new Audio('lobbymusic.mp3');
        audioLobby.loop = true;
        const audioPoint = new Audio('pointget.mp3');
        const audioOut = new Audio('gameout.mp3');

        function playLobbyMusic() { audioLobby.play().catch(e => console.log("Audio deferred")); }
        function stopLobbyMusic() { audioLobby.pause(); audioLobby.currentTime = 0; }

        let currentAuthMode = "login"; 
        let currentFirebaseUserKey = "";

        let userData = {
            username: "", uid: "", email: "", coins: 0, diamonds: 0, level: 1, likes: 0,
            currentItems: { char: "😕", avatar: "🍁", banner: "🎟" },
            inventory: { char: ["😕"], avatar: ["🍁"], banner: ["🎟"] },
            missionsClaimed: { m1: false, m2: false, m5: false },
            friends: {}, requests: {}
        };

        const baseShopItems = [
            { id: "h_base1", type: "char", icon: "Hero Default", raw: "😕" },
            { id: "h1", type: "char", icon: "Hero", raw: "🐶" }, { id: "h2", type: "char", icon: "Hero", raw: "🐱" },
            { id: "a_base1", type: "avatar", icon: "Avatar Default", raw: "🍁" },
            { id: "a1", type: "avatar", icon: "Avatar", raw: "💐" }, { id: "a2", type: "avatar", icon: "Avatar", raw: "🌹" },
            { id: "b_base1", type: "banner", icon: "Banner Default", raw: "🎟" },
            { id: "b1", type: "banner", icon: "Banner", raw: "📖" }, { id: "b2", type: "banner", icon: "Banner", raw: "📚" }
        ];

        let shopItems = [...baseShopItems];
        let timeInLobby = 0;
        let currentLibTab = "char";
        let searchedSocialUserKey = "";

        setInterval(() => {
            if(document.getElementById("lobby-screen").classList.contains("active")) { timeInLobby++; }
        }, 1000);

        function switchAuthMode(mode) {
            currentAuthMode = mode;
            document.querySelectorAll('.auth-tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            if (mode === "login") {
                document.getElementById("tab-login").classList.add('active-tab');
                document.getElementById("auth-username").style.display = "none";
                document.getElementById("auth-submit-btn").innerText = "LOG IN & PLAY";
            } else {
                document.getElementById("tab-signup").classList.add('active-tab');
                document.getElementById("auth-username").style.display = "block";
                document.getElementById("auth-submit-btn").innerText = "CREATE ACCOUNT";
            }
        }

        function handleAuthSubmit() {
            const email = document.getElementById("auth-email").value.trim();
            const pass = document.getElementById("auth-password").value.trim();
            const name = document.getElementById("auth-username").value.trim();

            if (!email || !pass) { alert("Please fill Email and Password!"); return; }

            if (currentAuthMode === "signup") {
                if (!name) { alert("Please provide a Username!"); return; }
                auth.createUserWithEmailAndPassword(email, pass).then((userCredential) => {
                    const randomUID = Math.floor(100000 + Math.random() * 900000).toString();
                    currentFirebaseUserKey = userCredential.user.uid;
                    userData.username = name;
                    userData.uid = randomUID;
                    userData.email = email;
                    userData.likes = 0;
                    database.ref('users/' + currentFirebaseUserKey).set(userData).then(() => {
                        setupSyncListener(currentFirebaseUserKey);
                    });
                }).catch(error => alert(error.message));
            } else {
                auth.signInWithEmailAndPassword(email, pass).then((userCredential) => {
                    currentFirebaseUserKey = userCredential.user.uid;
                    setupSyncListener(currentFirebaseUserKey);
                }).catch(error => alert(error.message));
            }
        }

        function setupSyncListener(firebaseUid) {
            database.ref('users/' + firebaseUid).on('value', (snapshot) => {
                if(snapshot.exists()) {
                    userData = snapshot.val();
                    updateLobbyUI();
                    renderLobbyFriendsList();
                    showScreen("lobby-screen");
                }
            });
        }

        function updateLobbyUI() {
            document.getElementById("lobby-coins").innerText = userData.coins || 0;
            document.getElementById("lobby-diamonds").innerText = userData.diamonds || 0;
            document.getElementById("prof-name").innerText = userData.username || "User";
            document.getElementById("prof-uid").innerText = "UID: " + (userData.uid || "------");
            document.getElementById("prof-level").innerText = userData.level || 1;
            document.getElementById("prof-banner").innerText = userData.currentItems?.banner || "🎟";
            document.getElementById("prof-avatar").innerText = userData.currentItems?.avatar || "🍁";
            document.getElementById("lobby-character").innerText = userData.currentItems?.char || "😕";
        }

        function syncWithDatabase() {
            if(currentFirebaseUserKey) { database.ref('users/' + currentFirebaseUserKey).update(userData); }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'lobby-screen') playLobbyMusic(); else stopLobbyMusic();
        }

        /* --- FRIENDS HOOKS & LOGIC PANEL --- */
        function openAddFriendModal() {
            document.getElementById("friend-search-input").value = "";
            document.getElementById("social-profile-card").style.display = "none";
            document.getElementById("add-friend-modal").style.display = "block";
        }

        function searchUserSocial() {
            const query = document.getElementById("friend-search-input").value.trim().toLowerCase();
            if(!query) { alert("Enter a valid name or UID!"); return; }

            database.ref('users').once('value', (snapshot) => {
                if(snapshot.exists()) {
                    let targetKey = null;
                    let targetData = null;
                    snapshot.forEach(child => {
                        let val = child.val();
                        if(val.uid === query || (val.username && val.username.toLowerCase() === query)) {
                            targetKey = child.key;
                            targetData = child.val();
                        }
                    });

                    if(targetKey) {
                        if(targetKey === currentFirebaseUserKey) { alert("You cannot search yourself!"); return; }
                        searchedSocialUserKey = targetKey;
                        
                        document.getElementById("social-banner").innerText = targetData.currentItems?.banner || "🎟";
                        document.getElementById("social-name").innerText = targetData.username || "User";
                        document.getElementById("social-uid").innerText = "UID: " + targetData.uid;
                        document.getElementById("social-avatar").innerText = targetData.currentItems?.avatar || "🍁";
                        document.getElementById("social-level").innerText = targetData.level || 1;
                        document.getElementById("social-likes-count").innerText = targetData.likes || 0;

                        // Event actions bindings
                        document.getElementById("social-like-btn").onclick = () => sendLikeToSocialUser(targetKey);
                        document.getElementById("social-request-btn").onclick = () => sendFriendRequestSocial(targetKey);

                        document.getElementById("social-profile-card").style.display = "flex";
                    } else {
                        alert("No match user profile found!");
                    }
                }
            });
        }

        function sendLikeToSocialUser(key) {
            database.ref('users/' + key + '/likes').transaction(currentLikes => {
                return (currentLikes || 0) + 1;
            }).then(() => {
                alert("You dropped a thumb up! 👍");
                searchUserSocial(); // Refresh data layout views
            });
        }

        function sendFriendRequestSocial(key) {
            database.ref('users/' + key + '/requests/' + currentFirebaseUserKey).set({
                uid: userData.uid,
                username: userData.username,
                avatar: userData.currentItems?.avatar || "🍁"
            }).then(() => {
                alert("Friend invitation sent successfully! 🚀");
            });
        }

        function openRequestsModal() {
            document.getElementById("requests-modal").style.display = "block";
            const reqContainer = document.getElementById("requests-container-list");
            reqContainer.innerHTML = "";

            if(!userData.requests || Object.keys(userData.requests).length === 0) {
                reqContainer.innerHTML = `<p style="text-align:center; color:#aaa; font-size:13px;">No pending alerts.</p>`;
                return;
            }

            Object.keys(userData.requests).forEach(senderKey => {
                let reqItem = userData.requests[senderKey];
                let row = document.createElement("div");
                row.className = "req-item-box";
                row.innerHTML = `
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-size:20px;">${reqItem.avatar || '🍁'}</span>
                        <div>
                            <p style="font-size:13px; font-weight:bold;">${reqItem.username}</p>
                            <small style="color:#aaa;">UID: ${reqItem.uid}</small>
                        </div>
                    </div>
                    <button class="action-inline-btn" onclick="acceptFriendRequest('${senderKey}')">ACCEPT</button>
                `;
                reqContainer.appendChild(row);
            });
        }

        function acceptFriendRequest(senderKey) {
            let friendObj = userData.requests[senderKey];
            
            // Add to sender's list
            database.ref('users/' + senderKey + '/friends/' + currentFirebaseUserKey).set({
                uid: userData.uid, username: userData.username, avatar: userData.currentItems?.avatar || "🍁"
            });

            // Add to user's list
            database.ref('users/' + currentFirebaseUserKey + '/friends/' + senderKey).set({
                uid: friendObj.uid, username: friendObj.username, avatar: friendObj.avatar
            });

            // Delete request node hook
            database.ref('users/' + currentFirebaseUserKey + '/requests/' + senderKey).remove().then(() => {
                alert("Request accepted! Friend added.");
                openRequestsModal();
            });
        }

        function renderLobbyFriendsList() {
            const listContainer = document.getElementById("lobby-friends-container");
            listContainer.innerHTML = "";

            if(!userData.friends || Object.keys(userData.friends).length === 0) {
                listContainer.innerHTML = `<p style="text-align:center; color:#7f8c8d; font-size:10px; margin-top:10px;">Empty list</p>`;
                return;
            }

            Object.keys(userData.friends).forEach(key => {
                let friendData = userData.friends[key];
                let fRow = document.createElement("div");
                fRow.className = "friend-row-item";
                fRow.innerHTML = `
                    <span>${friendData.avatar || '🍁'}</span>
                    <div style="overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">
                        <p style="font-weight:bold; color:yellow;">${friendData.username}</p>
                        <small style="color:#ccc; font-size:9px;">UID:${friendData.uid}</small>
                    </div>
                `;
                listContainer.appendChild(fRow);
            });
        }

        function closeModal(id) { document.getElementById(id).style.display = "none"; }

        // --- GAME PLAY REGULAR LOGICS ---
        function openStore() {
            document.getElementById("store-modal").style.display = "block";
            const container = document.getElementById("store-items-container");
            container.innerHTML = "";
            shopItems.forEach(item => {
                const isOwned = userData.inventory?.[item.type]?.includes(item.raw);
                const itemDiv = document.createElement("div");
                itemDiv.className = "shop-item";
                itemDiv.innerHTML = `
                    <span>${item.raw}</span>
                    <p style="font-size:11px; margin-bottom:5px;">${item.icon}</p>
                    <button class="buy-item-btn" ${isOwned ? 'disabled style="background:grey;"' : ''} onclick="buyItem('${item.type}', '${item.raw}')">
                        ${isOwned ? 'OWNED' : '🪙500'}
                    </button>
                `;
                container.appendChild(itemDiv);
            });
        }

        function buyItem(type, emoji) {
            if (userData.coins >= 500) { userData.coins -= 500; } else { alert("No coins!"); return; }
            if(!userData.inventory[type]) userData.inventory[type] = [];
            userData.inventory[type].push(emoji);
            syncWithDatabase(); openStore();
        }

        function openMissions() {
            document.getElementById("mission-modal").style.display = "block";
            const container = document.getElementById("missions-container");
            container.innerHTML = "";
            const missionData = [{ id: "m1", text: "Play for 1 minute", reward: 100, targetSec: 60 }];
            missionData.forEach(m => {
                const isClaimed = userData.missionsClaimed?.[m.id] || false;
                const isEligible = timeInLobby >= m.targetSec;
                const mDiv = document.createElement("div");
                mDiv.className = "mission-item";
                mDiv.innerHTML = `
                    <div><p style="font-size:13px;">${m.text}</p></div>
                    <button class="claim-btn" ${isClaimed || !isEligible ? 'disabled' : ''} onclick="claimMission('${m.id}', ${m.reward})">
                        ${isClaimed ? 'CLAIMED' : 'CLAIM'}
                    </button>
                `;
                container.appendChild(mDiv);
            });
        }

        function claimMission(id, reward) {
            if (!userData.missionsClaimed) userData.missionsClaimed = {};
            userData.coins += reward; userData.missionsClaimed[id] = true;
            syncWithDatabase(); openMissions();
        }

        function openLibrary() { document.getElementById("library-modal").style.display = "block"; switchLibTab(currentLibTab); }
        
        function switchLibTab(tab) {
            currentLibTab = tab;
            document.querySelectorAll('.lib-nav-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`tab-${tab}-btn`).classList.add('active-tab');
            const container = document.getElementById("library-items-container");
            container.innerHTML = "";
            (userData.inventory?.[tab] || []).forEach(emoji => {
                const isEquipped = userData.currentItems?.[tab] === emoji;
                const div = document.createElement("div");
                div.className = "lib-item";
                div.innerHTML = `
                    <span>${emoji}</span>
                    <button class="equip-item-btn ${isEquipped ? 'equipped' : ''}" onclick="equipItem('${tab}', '${emoji}')">${isEquipped ? 'EQUIPPED' : 'EQUIP'}</button>
                `;
                container.appendChild(div);
            });
        }

        function equipItem(type, emoji) { if(!userData.currentItems) userData.currentItems={}; userData.currentItems[type] = emoji; syncWithDatabase(); switchLibTab(type); }

        let gameScore = 0, targetScore = 6, playerIndex = 22, totalBoxes = 54;

        function startGameCountdown() {
            showScreen("game-screen");
            const overlay = document.getElementById("countdown-overlay");
            overlay.style.display = "flex";
            let count = 3; overlay.innerText = count;
            let countInterval = setInterval(() => {
                count--;
                if(count > 0) overlay.innerText = count;
                else { clearInterval(countInterval); overlay.style.display = "none"; initGameBoard(); }
            }, 1000);
        }

        function initGameBoard() {
            gameScore = 0; targetScore = 6;
            document.getElementById("game-score").innerText = gameScore;
            document.getElementById("target-score").innerText = targetScore;
            document.getElementById("game-current-level").innerText = userData.level || 1;
            playerIndex = Math.floor(Math.random() * totalBoxes);
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById("game-grid"); grid.innerHTML = "";
            let obstacleIndex = (playerIndex + 10) % totalBoxes;
            let appleIndex = (playerIndex + 20) % totalBoxes;
            for (let i = 0; i < totalBoxes; i++) {
                const box = document.createElement("div"); box.className = "grid-box";
                if (i === playerIndex) box.innerText = userData.currentItems?.char || "😕";
                else if (i === obstacleIndex) box.innerText = "🗿";
                else if (i === appleIndex) box.innerText = "🍎";
                box.onclick = () => handleBoxClick(i, box.innerText);
                grid.appendChild(box);
            }
        }

        function handleBoxClick(clickedIndex, content) {
            if (content === "🍎") {
                audioPoint.currentTime = 0; audioPoint.play().catch(e=>console.log(e));
                gameScore++; document.getElementById("game-score").innerText = gameScore;
                if (gameScore >= targetScore) {
                    userData.level = (userData.level || 1) + 1; syncWithDatabase(); alert("Level Complete!"); exitGame();
                } else { playerIndex = clickedIndex; renderGrid(); }
            } else if (content === "🗿") {
                audioOut.currentTime = 0; audioOut.play().catch(e=>console.log(e));
                alert("Game Over!"); exitGame();
            } else { playerIndex = clickedIndex; renderGrid(); }
        }

        function exitGame() { showScreen("lobby-screen"); }
    </script>
</body>
</html>
