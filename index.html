<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA - The Game</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; color: white; }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .active { display: flex; }

        /* Signup Screen */
        #signup-screen { flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #2c3e50, #000000); }
        .form-container { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 15px; backdrop-filter: blur(10px); width: 350px; text-align: center; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); }
        .form-container h1 { margin-bottom: 20px; color: #00ffcc; letter-spacing: 2px; }
        .form-container input { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; outline: none; }
        .form-container input::placeholder { color: #ccc; }
        .form-container button { width: 100%; padding: 12px; margin-top: 15px; border: none; border-radius: 8px; background: #00ffcc; color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .form-container button:hover { background: #00b38f; transform: scale(1.02); }

        /* Lobby Screen */
        #lobby-screen { background: radial-gradient(circle, #2c3e50, #0f171e); flex-direction: column; justify-content: space-between; padding: 20px; }
        
        /* Top Bar (Coins & Diamonds) */
        .top-bar { display: flex; justify-content: center; gap: 30px; width: 100%; position: absolute; top: 20px; left: 0; z-index: 10; }
        .currency-box { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 20px; border: 1px solid #555; display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 18px; }
        .buy-btn { background: #ffcc00; border: none; border-radius: 50%; width: 24px; height: 24px; font-weight: bold; cursor: pointer; margin-left: 5px; display: flex; align-items: center; justify-content: center; color: black; }

        /* Profile Top Left */
        .profile-card { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 2px solid #fff; width: 220px; overflow: hidden; }
        .banner-bg { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; position: relative; font-weight: bold; text-shadow: 2px 2px 4px #000; }
        .profile-name { position: absolute; top: 5px; width: 100%; text-align: center; font-size: 14px; color: yellow; font-weight: bold; }
        .profile-uid { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 12px; color: #fff; }
        .avatar-container { background: rgba(255,255,255,0.1); padding: 10px; display: flex; align-items: center; gap: 15px; }
        .avatar-box { font-size: 35px; background: rgba(0,0,0,0.3); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border: 1px solid #aaa; }
        .level-txt { font-size: 14px; font-weight: bold; color: #00ffcc; }

        /* Center Character */
        .center-character { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; text-shadow: 0px 0px 20px rgba(255,255,255,0.4); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translate(-50%, -52%); } 50% { transform: translate(-50%, -48%); } }

        /* Left Side Menu (Store & Mission) */
        .left-menu { position: absolute; left: 20px; top: 160px; display: flex; flex-direction: column; gap: 15px; }
        .menu-btn { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: #e74c3c; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; }
        .menu-btn.mission { background: #2ecc71; }
        .menu-btn:hover { opacity: 0.9; transform: scale(1.05); }

        /* Bottom Left & Bottom Right */
        .bottom-left { position: absolute; bottom: 20px; left: 20px; }
        .bottom-right { position: absolute; bottom: 20px; right: 20px; }
        .start-btn { padding: 15px 40px; font-size: 24px; font-weight: bold; border: none; border-radius: 50px; background: linear-gradient(45deg, #f1c40f, #f39c12); color: black; cursor: pointer; box-shadow: 0 0 20px #f1c40f; }
        .start-btn:hover { transform: scale(1.1); }

        /* Modals / Popups */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; border: 3px solid #00ffcc; border-radius: 15px; width: 80%; max-width: 500px; max-height: 70vh; overflow-y: auto; padding: 20px; z-index: 100; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #555; padding-bottom: 10px; }
        .close-modal { font-size: 24px; cursor: pointer; background: none; border: none; color: white; }
        .shop-grid, .lib-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .shop-item, .lib-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #777; }
        .shop-item span, .lib-item span { font-size: 40px; display: block; margin-bottom: 10px; }
        .buy-item-btn, .equip-item-btn { padding: 5px 10px; font-size: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .buy-item-btn { background: #3498db; color: white; }
        .equip-item-btn { background: #e67e22; color: white; }
        .equip-item-btn.equipped { background: #2ecc71; pointer-events: none; }

        /* Missions List */
        .mission-item { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #555; }
        .claim-btn { padding: 8px 15px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .claim-btn:disabled { background: #7f8c8d; cursor: not-allowed; }

        /* Game Screen */
        #game-screen { background: #111; flex-direction: column; align-items: center; justify-content: center; }
        .game-header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; padding: 10px; font-size: 20px; font-weight: bold; color: #00ffcc; }
        .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(9, 1fr); gap: 4px; width: 95vw; height: 75vh; max-width: 600px; max-height: 540px; background: #222; padding: 5px; border-radius: 10px; border: 2px solid #555; }
        .grid-box { background: #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: background 0.1s; }
        .grid-box:active { background: #444; }

        /* Countdown Overlay */
        #countdown-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; font-size:120px; font-weight:bold; color:#fff; z-index:200; }
        
        /* Library Nav Tabs */
        .lib-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .lib-nav-btn { flex: 1; padding: 8px; background: #34495e; border: none; color: white; border-radius: 5px; cursor: pointer; }
        .lib-nav-btn.active-tab { background: #00ffcc; color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div id="countdown-overlay">3</div>

    <div id="store-modal" class="modal">
        <div class="modal-header">
            <h2>MA STORE 🛒</h2>
            <button class="close-modal" onclick="closeModal('store-modal')">✖</button>
        </div>
        <div class="shop-grid" id="store-items-container"></div>
    </div>

    <div id="mission-modal" class="modal">
        <div class="modal-header">
            <h2>MISSIONS 📜</h2>
            <button class="close-modal" onclick="closeModal('mission-modal')">✖</button>
        </div>
        <div id="missions-container"></div>
    </div>

    <div id="library-modal" class="modal">
        <div class="modal-header">
            <h2>MY LIBRARY 🎒</h2>
            <button class="close-modal" onclick="closeModal('library-modal')">✖</button>
        </div>
        <div class="lib-nav">
            <button class="lib-nav-btn active-tab" id="tab-char-btn" onclick="switchLibTab('char')">Character</button>
            <button class="lib-nav-btn" id="tab-avatar-btn" onclick="switchLibTab('avatar')">Avatar</button>
            <button class="lib-nav-btn" id="tab-banner-btn" onclick="switchLibTab('banner')">Banner</button>
        </div>
        <div class="lib-tabs" id="library-items-container"></div>
    </div>

    <div id="signup-screen" class="screen active">
        <div class="form-container">
            <h1>MA GAME</h1>
            <input type="text" id="signup-username" placeholder="Username (e.g. Rahul)">
            <input type="email" id="signup-email" placeholder="Email (user@gmail.com)">
            <input type="password" id="signup-password" placeholder="Password (user123@)">
            <button onclick="handleSignup()">SIGN UP & PLAY</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="top-bar">
            <div class="currency-box">🪙 <span id="lobby-coins">0</span></div>
            <div class="currency-box">💎 <span id="lobby-diamonds">0</span> <button class="buy-btn" onclick="buyDiamonds()">+</button></div>
        </div>

        <div class="profile-card">
            <div class="banner-bg" id="prof-banner">🎟</div>
            <div class="profile-name" id="prof-name">User</div>
            <div class="profile-uid" id="prof-uid">UID: ------</div>
            <div class="avatar-container">
                <div class="avatar-box" id="prof-avatar">🍁</div>
                <div class="level-txt">LVL: <span id="prof-level">1</span></div>
            </div>
        </div>

        <div class="center-character" id="lobby-character">😕</div>

        <div class="left-menu">
            <button class="menu-btn" onclick="openStore()">STORE 🛒</button>
            <button class="menu-btn mission" onclick="openMissions()">MISSION 📜</button>
        </div>

        <div class="bottom-left">
            <button class="menu-btn" style="background:#9b59b6;" onclick="openLibrary()">MY LIBRARY 🎒</button>
        </div>

        <div class="bottom-right">
            <button class="start-btn" onclick="startGameCountdown()">START GAME 🚀</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header">
            <div>Score: <span id="game-score">0</span> / <span id="target-score">5</span></div>
            <div>Level: <span id="game-current-level">1</span></div>
        </div>
        <div class="grid-container" id="game-grid"></div>
        <button class="menu-btn" style="margin-top:20px; background:#e74c3c;" onclick="exitGame()">EXIT LOBBY</button>
    </div>

    <script>
        // --- INTEGRATED FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAJGU-ZX2GFOek8hteak0UPPYPQP_e1arY",
            authDomain: "triple-ae17f.firebaseapp.com",
            databaseURL: "https://triple-ae17f-default-rtdb.firebaseio.com",
            projectId: "triple-ae17f",
            storageBucket: "triple-ae17f.firebasestorage.app",
            messagingSenderId: "1054581990158",
            appId: "1:1054581990158:web:c7cf28f432e826baa12d5f"
        };
        
        // Initialize Firebase (Compat Layer)
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // --- GLOBAL USER DATA STRUCTURE ---
        let userData = {
            username: "", uid: "", email: "",
            coins: 0, diamonds: 0, level: 1,
            currentItems: { char: "😕", avatar: "🍁", banner: "🎟" },
            inventory: {
                char: ["😕"],
                avatar: ["🍁"],
                banner: ["🎟"]
            },
            missionsClaimed: { m1: false, m2: false, m5: false }
        };

        // --- SHOP CONFIGURATION (60 Diamond / 500 Coin Rate) ---
        const shopItems = [
            { id: "c1", type: "char", icon: "Character ⛹️‍♀️", raw: "⛹️‍♀️" },
            { id: "c2", type: "char", icon: "Character ⛹️‍♂️", raw: "⛹️‍♂️" },
            { id: "c3", type: "char", icon: "Character 🤾‍♀️", raw: "🤾‍♀️" },
            { id: "a1", type: "avatar", icon: "Avatar 🌺", raw: "🌺" },
            { id: "a2", type: "avatar", icon: "Avatar 💐", raw: "💐" },
            { id: "a3", type: "avatar", icon: "Avatar 🌷", raw: "🌷" },
            { id: "b1", type: "banner", icon: "Banner 🎫", raw: "🎫" },
            { id: "b2", type: "banner", icon: "Banner 🥅", raw: "🥅" }
        ];

        let timeInLobby = 0;
        let currentLibTab = "char";

        // Lobby Timer Track for Missions
        setInterval(() => {
            if(document.getElementById("lobby-screen").classList.contains("active")) {
                timeInLobby++;
            }
        }, 1000);

        // --- AUTH & SIGNUP PROCESS ---
        function handleSignup() {
            const name = document.getElementById("signup-username").value.trim();
            const email = document.getElementById("signup-email").value.trim();
            const pass = document.getElementById("signup-password").value.trim();

            if(!name || !email || !pass) { alert("Please fill all fields!"); return; }

            auth.createUserWithEmailAndPassword(email, pass).then((userCredential) => {
                // Generate 6 Digit Unique Game UID
                const randomUID = Math.floor(100000 + Math.random() * 900000).toString();
                
                userData.username = name;
                userData.uid = randomUID;
                userData.email = email;

                // Save inside real-time database instance
                database.ref('users/' + userCredential.user.uid).set(userData).then(() => {
                    setupSyncListener(userCredential.user.uid);
                });
            }).catch(error => alert(error.message));
        }

        function setupSyncListener(firebaseUid) {
            database.ref('users/' + firebaseUid).on('value', (snapshot) => {
                if(snapshot.exists()) {
                    userData = snapshot.val();
                    updateLobbyUI();
                    showScreen("lobby-screen");
                }
            });
        }

        function updateLobbyUI() {
            document.getElementById("lobby-coins").innerText = userData.coins;
            document.getElementById("lobby-diamonds").innerText = userData.diamonds;
            document.getElementById("prof-name").innerText = userData.username;
            document.getElementById("prof-uid").innerText = "UID: " + userData.uid;
            document.getElementById("prof-level").innerText = userData.level;
            
            document.getElementById("prof-banner").innerText = userData.currentItems.banner;
            document.getElementById("prof-avatar").innerText = userData.currentItems.avatar;
            document.getElementById("lobby-character").innerText = userData.currentItems.char;
        }

        function syncWithDatabase() {
            const user = auth.currentUser;
            if(user) { database.ref('users/' + user.uid).update(userData); }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- STORE LOGIC ---
        function openStore() {
            document.getElementById("store-modal").style.display = "block";
            const container = document.getElementById("store-items-container");
            container.innerHTML = "";

            shopItems.forEach(item => {
                const isOwned = userData.inventory[item.type].includes(item.raw);
                const itemDiv = document.createElement("div");
                itemDiv.className = "shop-item";
                itemDiv.innerHTML = `
                    <span>${item.raw}</span>
                    <p style="font-size:12px; margin-bottom:5px;">${item.icon}</p>
                    <button class="buy-item-btn" ${isOwned ? 'disabled style="background:grey;"' : ''} onclick="buyItem('${item.type}', '${item.raw}')">
                        ${isOwned ? 'OWNED' : '💎60 / 🪙500'}
                    </button>
                `;
                container.appendChild(itemDiv);
            });
        }

        function buyItem(type, emoji) {
            if (userData.diamonds >= 60) {
                userData.diamonds -= 60;
            } else if (userData.coins >= 500) {
                userData.coins -= 500;
            } else {
                alert("Insufficient Diamonds or Coins!");
                return;
            }
            userData.inventory[type].push(emoji);
            syncWithDatabase();
            openStore(); 
        }

        function buyDiamonds() {
            userData.diamonds += 100; 
            syncWithDatabase();
            alert("100 Diamonds bought successfully!");
        }

        // --- MISSIONS LOGIC ---
        function openMissions() {
            document.getElementById("mission-modal").style.display = "block";
            const container = document.getElementById("missions-container");
            container.innerHTML = "";

            const missionData = [
                { id: "m1", text: "Play game for 1 minute", reward: 100, targetSec: 60 },
                { id: "m2", text: "Play game for 2 minutes", reward: 200, targetSec: 120 },
                { id: "m5", text: "Play game for 5 minutes", reward: 1000, targetSec: 300 }
            ];

            missionData.forEach(m => {
                const isClaimed = userData.missionsClaimed[m.id] || false;
                const isEligible = timeInLobby >= m.targetSec;
                
                const mDiv = document.createElement("div");
                mDiv.className = "mission-item";
                mDiv.innerHTML = `
                    <div>
                        <p>${m.text}</p>
                        <small style="color:#aaa;">Progress: ${Math.min(timeInLobby, m.targetSec)}/${m.targetSec}s</small>
                    </div>
                    <button class="claim-btn" ${isClaimed || !isEligible ? 'disabled' : ''} onclick="claimMission('${m.id}', ${m.reward})">
                        ${isClaimed ? 'CLAIMED' : isEligible ? `CLAIM 🪙${m.reward}` : `🪙${m.reward}`}
                    </button>
                `;
                container.appendChild(mDiv);
            });
        }

        function claimMission(id, reward) {
            userData.coins += reward;
            userData.missionsClaimed[id] = true;
            syncWithDatabase();
            openMissions();
        }

        // --- LIBRARY LOGIC ---
        function openLibrary() {
            document.getElementById("library-modal").style.display = "block";
            switchLibTab(currentLibTab);
        }

        function switchLibTab(tab) {
            currentLibTab = tab;
            document.querySelectorAll('.lib-nav-btn').forEach(b => b.classList.remove('active-tab'));
            
            if(tab === 'char') document.getElementById("tab-char-btn").classList.add('active-tab');
            if(tab === 'avatar') document.getElementById("tab-avatar-btn").classList.add('active-tab');
            if(tab === 'banner') document.getElementById("tab-banner-btn").classList.add('active-tab');

            const container = document.getElementById("library-items-container");
            container.innerHTML = "";

            const itemsOwned = userData.inventory[tab] || [];
            itemsOwned.forEach(emoji => {
                const isEquipped = userData.currentItems[tab] === emoji;
                const div = document.createElement("div");
                div.className = "lib-item";
                div.innerHTML = `
                    <span>${emoji}</span>
                    <button class="equip-item-btn ${isEquipped ? 'equipped' : ''}" onclick="equipItem('${tab}', '${emoji}')">
                        ${isEquipped ? 'EQUIPPED' : 'EQUIP'}
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function equipItem(type, emoji) {
            userData.currentItems[type] = emoji;
            syncWithDatabase();
            switchLibTab(type);
        }

        function closeModal(id) { document.getElementById(id).style.display = "none"; }


        // --- CORE GAME ENGINE WAALA LOGIC ---
        let gameScore = 0;
        let targetScore = 5;
        let playerIndex = 45;
        let totalBoxes = 90;

        function startGameCountdown() {
            showScreen("game-screen");
            const overlay = document.getElementById("countdown-overlay");
            overlay.style.display = "flex";
            let count = 3;
            overlay.innerText = count;

            let countInterval = setInterval(() => {
                count--;
                if(count > 0) {
                    overlay.innerText = count;
                } else {
                    clearInterval(countInterval);
                    overlay.style.display = "none";
                    initGameBoard();
                }
            }, 1000);
        }

        function initGameBoard() {
            gameScore = 0;
            // Target Score Logic Formula: 5 + (level - 1) * 2;
            targetScore = 5 + (userData.level - 1) * 2; 

            document.getElementById("game-score").innerText = gameScore;
            document.getElementById("target-score").innerText = targetScore;
            document.getElementById("game-current-level").innerText = userData.level;

            playerIndex = Math.floor(Math.random() * totalBoxes);
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById("game-grid");
            grid.innerHTML = "";

            // Dynamic safe shuffle positions
            let obstacleIndex = Math.floor(Math.random() * totalBoxes);
            while(obstacleIndex === playerIndex) { obstacleIndex = Math.floor(Math.random() * totalBoxes); }

            let greenAppleIndex = Math.floor(Math.random() * totalBoxes);
            while(greenAppleIndex === playerIndex || greenAppleIndex === obstacleIndex) { greenAppleIndex = Math.floor(Math.random() * totalBoxes); }

            let redAppleIndex = Math.floor(Math.random() * totalBoxes);
            while(redAppleIndex === playerIndex || redAppleIndex === obstacleIndex || redAppleIndex === greenAppleIndex) { redAppleIndex = Math.floor(Math.random() * totalBoxes); }

            for (let i = 0; i < totalBoxes; i++) {
                const box = document.createElement("div");
                box.className = "grid-box";
                
                if (i === playerIndex) {
                    box.innerText = userData.currentItems.char;
                } else if (i === obstacleIndex) {
                    box.innerText = "🗿";
                } else if (i === redAppleIndex) {
                    box.innerText = "🍎";
                } else if (i === greenAppleIndex) {
                    box.innerText = "🍏";
                }

                box.onclick = () => handleBoxClick(i, box.innerText);
                grid.appendChild(box);
            }
        }

        function handleBoxClick(clickedIndex, content) {
            if (content === "🍎" || content === "🍏") {
                gameScore++;
                document.getElementById("game-score").innerText = gameScore;
                
                if (gameScore >= targetScore) {
                    alert(`Level ${userData.level} Complete! 🎉`);
                    userData.level += 1;
                    syncWithDatabase();
                    exitGame();
                } else {
                    playerIndex = clickedIndex;
                    renderGrid();
                }
            } else if (content === "🗿") {
                alert("Game Over! Stone 🗿 touch ho gaya.");
                exitGame();
            } else {
                playerIndex = clickedIndex;
                renderGrid();
            }
        }

        function exitGame() {
            showScreen("lobby-screen");
        }
    </script>
</body>
</html>
